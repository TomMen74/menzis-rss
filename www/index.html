<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Menzis RSS v6.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8c00;
            --on-primary: #002200;
            --primary-container: #004400;
            --secondary: #ff9933;
            --surface: #0a0a0a;
            --surface-container: #1a1a1a;
            --surface-container-high: #2a2a2a;
            --on-surface: #e0e0e0;
            --on-surface-variant: #909090;
            --outline: #444444;
            --error: #ff5555;
            --elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            --elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
            --elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
            --radius-small: 8px;
            --radius-medium: 12px;
            --radius-large: 16px;
            --radius-extra-large: 28px;
        }

        :root[data-theme="light"] {
            --primary: #1a73e8;
            --on-primary: #ffffff;
            --primary-container: #d4e4ff;
            --secondary: #cc6600;
            --surface: #f0f0f0;
            --surface-container: #ffffff;
            --surface-container-high: #e8e8e8;
            --on-surface: #1a1a1a;
            --on-surface-variant: #555555;
            --outline: #bbbbbb;
            --error: #cc0000;
            --title-color: #ff8c00;
            --feedname-color: #1a73e8;
        }

        :root[data-theme="dark"] {
            --primary: #ff8c00;
            --on-primary: #002200;
            --primary-container: #4d2800;
            --secondary: #ff9933;
            --surface: #0a0a0a;
            --surface-container: #1a1a1a;
            --surface-container-high: #2a2a2a;
            --on-surface: #e0e0e0;
            --on-surface-variant: #909090;
            --outline: #444444;
            --error: #ff5555;
            --title-color: #66b3ff;
            --feedname-color: #ff8c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--surface-container);
            box-shadow: var(--elevation-2);
            z-index: 100;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .hamburger:hover { background: var(--surface-container-high); }
        .hamburger span {
            width: 18px;
            height: 2px;
            background: var(--on-surface);
            margin: 0 auto;
            border-radius: 1px;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--secondary);
            flex: 1;
            letter-spacing: 0.1px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            padding: 0.5rem 0.75rem 0.5rem 2.25rem;
            border-radius: var(--radius-extra-large);
            width: 120px;
            font-size: 0.9rem;
            transition: width 0.3s, background 0.2s, border-color 0.2s;
        }
        .search-input:focus { 
            width: 180px; 
            outline: none; 
            background: var(--surface-container-high);
            border-color: var(--primary);
        }
        .search-input::placeholder { color: var(--on-surface-variant); }
        
        .search-icon {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            color: var(--on-surface-variant);
        }

        .tab-bar {
            position: sticky;
            top: 52px;
            z-index: 200;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--surface-container);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-extra-large);
            background: var(--surface);
            color: var(--on-surface-variant);
            font-size: 0.8125rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .tab:hover { background: var(--surface-container-high); }
        .tab.active {
            background: var(--primary);
            color: var(--on-primary);
            box-shadow: var(--elevation-1);
        }
        .tab.dragging { opacity: 0.5; }
        .tab.drag-over { border-left: 2px solid var(--primary); }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .article-card {
            background: var(--surface-container);
            border-radius: var(--radius-medium);
            padding: 1rem;
            box-shadow: var(--elevation-1);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .article-card:hover { box-shadow: var(--elevation-2); }
        .article-card:active { transform: scale(0.98); }

        .article-card .swipe-bg-left {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 40px;
            background: var(--error);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: var(--radius-medium) var(--radius-medium) 0 0;
            z-index: 10;
        }
        .article-card .swipe-bg-right {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 40px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: var(--radius-medium) var(--radius-medium) 0 0;
            z-index: 10;
        }
        .article-card.swiping-left .swipe-bg-left { opacity: 1; }
        .article-card.swiping-right .swipe-bg-right { opacity: 1; }

        .article-card .swipe-hint {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .article-card.swiping-left .swipe-hint {
            opacity: 1;
            color: var(--error);
        }
        .article-card.swiping-right .swipe-hint {
            opacity: 1;
            color: var(--primary);
        }

        .article-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-small);
            margin-bottom: 0.75rem;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: var(--title-color);
        }

        .article-meta {
            font-size: 0.75rem;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .article-meta .feed-name {
            color: var(--feedname-color);
            font-weight: 500;
        }
        .article-meta .dot {
            width: 3px;
            height: 3px;
            background: var(--on-surface-variant);
            border-radius: 50%;
        }
        .article-meta .hashtags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .article-meta .hashtag {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
        }
        .article-meta .hashtag:hover {
            text-decoration: underline;
        }

        .no-feeds, .error-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--on-surface-variant);
        }
        .no-feeds h3, .error-msg h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--on-surface);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            gap: 1rem;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--surface-container-high);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--on-surface-variant); font-size: 0.875rem; }

        .pull-indicator {
            text-align: center;
            padding: 0.75rem;
            color: var(--primary);
            font-size: 0.875rem;
            display: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            max-width: 85vw;
            height: 100vh;
            background: var(--surface-container);
            box-shadow: var(--elevation-3);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--outline);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-title { font-size: 1.25rem; font-weight: 500; color: var(--on-surface); }
        .close-sidebar {
            background: none;
            border: none;
            color: var(--on-surface);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .close-sidebar:hover { background: var(--surface-container-high); }

        .nav-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid var(--outline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--surface-container-high); }
        .nav-item-label { font-size: 1rem; color: var(--on-surface); }
        .nav-count {
            background: var(--primary);
            color: var(--on-primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .overlay-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface);
            z-index: 300;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .overlay-page.active { display: flex; }

        .overlay-header {
            padding: 1rem 0.5rem;
            background: var(--surface-container);
            border-bottom: 1px solid var(--outline);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--on-surface);
            padding: 0.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: background 0.2s;
        }
        .close-btn:hover { background: var(--surface-container-high); }
        .overlay-title { font-size: 1.25rem; font-weight: 500; flex: 1; color: var(--on-surface); }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .feed-category-title {
            padding: 1rem 0.75rem 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-item {
            padding: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--on-surface);
            background: var(--surface-container);
            border-radius: var(--radius-medium);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .category-item:hover { background: var(--surface-container-high); }

        .category-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .small-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: var(--radius-small);
            background: var(--surface-container);
            color: var(--on-surface);
            border: 1px solid var(--outline);
            font-size: 0.8125rem;
            cursor: pointer;
        }
        .small-btn:hover { background: var(--surface-container-high); }

        .delete-icon {
            margin-left: auto;
            cursor: pointer;
            color: var(--error);
            opacity: 0.7;
        }
        .delete-icon:hover { opacity: 1; }

        .back-btn {
            padding: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        .back-btn:hover { text-decoration: underline; }

        .feed-category-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            cursor: pointer;
            border-radius: var(--radius-small);
            transition: background 0.2s;
            touch-action: manipulation;
        }
        .feed-item:hover { background: var(--surface-container-high); }
        .feed-item.dragging { opacity: 0.5; background: var(--primary); }
        .feed-item.drag-over { border-top: 2px solid var(--primary); }

        .feed-toggle {
            width: 24px;
            height: 24px;
            border: 2px solid var(--outline);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .feed-toggle.checked {
            background: var(--primary);
            border-color: var(--primary);
        }
        .feed-toggle.checked::after {
            content: '✓';
            color: var(--on-primary);
            font-size: 0.875rem;
            font-weight: bold;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            padding: 1rem;
        }

        .theme-btn {
            padding: 1rem;
            border-radius: var(--radius-medium);
            cursor: pointer;
            border: 1px solid var(--outline);
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--on-surface);
        }
        .theme-btn:hover { box-shadow: var(--elevation-2); }
        .theme-btn.active { border-color: var(--primary); box-shadow: var(--elevation-2); }

        .custom-url-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            border-radius: var(--radius-small);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .custom-url-input:focus { outline: none; border-color: var(--primary); }

        .add-btn {
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: box-shadow 0.2s;
        }
        .add-btn:hover { box-shadow: var(--elevation-2); }

        .action-btn {
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-weight: 500;
            margin: 1rem;
            display: block;
            width: calc(100% - 2rem);
        }

        .keyword-input-container {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        .keyword-input {
            flex: 1;
            padding: 0.75rem;
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            border-radius: var(--radius-small);
            font-size: 1rem;
        }
        .keyword-input:focus { outline: none; border-color: var(--primary); }

        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0 1rem 1rem;
        }
        .keyword-tag {
            background: var(--primary);
            color: var(--on-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-extra-large);
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .keyword-tag .remove {
            font-size: 1rem;
            line-height: 1;
            opacity: 0.8;
        }
        .keyword-tag .remove:hover { opacity: 1; }

        .fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            box-shadow: var(--elevation-3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 50;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: var(--elevation-3); }
        .fab:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
        <div class="header-title">
            <span id="headerTitle">Menzis RSS <small>v6.4</small></span>
        </div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" class="search-input" placeholder="Suchen..." oninput="filterArticles(this.value)">
        </div>
    </div>

    <div class="tab-bar" id="tabBar"></div>

    <div id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
        </div>
        <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Menü</span>
            <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div class="nav-item" onclick="openOverlay('feeds')">
            <span class="nav-item-label">Feed-Auswahl</span>
        </div>
        <div class="nav-item" onclick="openOverlay('url')">
            <span class="nav-item-label">Eigene URL</span>
        </div>
        <div class="nav-item" onclick="openOverlay('theme')">
            <span class="nav-item-label">Design</span>
        </div>
        <div class="nav-item" onclick="openOverlay('readLater')">
            <span class="nav-item-label">Später lesen</span>
            <span id="readLaterCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="openOverlay('keywords')">
            <span class="nav-item-label">Keywords</span>
            <span id="keywordCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="openOverlay('hidden')">
            <span class="nav-item-label">Versteckte Artikel</span>
            <span id="hiddenCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="resetApp()">
            <span class="nav-item-label">App zurücksetzen</span>
        </div>
    </div>

    <div class="overlay-page" id="overlay-feeds">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Feed-Auswahl</span>
        </div>
        <div class="overlay-content" id="feedLists"></div>
    </div>

    <div class="overlay-page" id="overlay-theme">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Design</span>
        </div>
        <div class="overlay-content">
            <div class="feed-category-title">Helligkeit</div>
            <div class="theme-selector" style="margin-top:0.5rem;">
                <div class="theme-btn" id="btnLight" onclick="setThemeMode('light')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> Hell</div>
                <div class="theme-btn" id="btnDark" onclick="setThemeMode('dark')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dunkel</div>
            </div>
        </div>
    </div>

    <div class="overlay-page" id="overlay-url">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Eigene URL hinzufügen</span>
        </div>
        <div class="overlay-content">
            <input type="text" class="custom-url-input" id="customUrl" placeholder="https://...">
            <button class="add-btn" onclick="addCustomFeed()">Hinzufügen</button>
        </div>
    </div>

    <div class="overlay-page" id="overlay-readLater">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Später lesen</span>
        </div>
        <div class="overlay-content" id="readLaterList"></div>
    </div>

    <div class="overlay-page" id="overlay-keywords">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Keywords</span>
        </div>
        <div class="overlay-content">
            <div class="keyword-input-container">
                <input type="text" class="keyword-input" id="keywordInput" placeholder="Keyword z.B. Schwerin" onkeydown="if(event.key==='Enter')addKeyword()">

        function getArticleAge(pubDate) {
            const now = new Date();
            const pub = new Date(pubDate);
            const diffMs = now - pub;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            
            if (diffMins < 1) return 'Gerade eben';
            if (diffMins < 60) return 'vor ' + diffMins + ' Min';
            if (diffHours < 24) return 'vor ' + diffHours + ' Std';
            if (diffDays === 1) return 'Gestern';
            if (diffDays < 7) return 'vor ' + diffDays + ' Tagen';
            return pub.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        }

            const text = title + ' ' + (content || '');
            const matches = text.match(/#[\wäöüÄÖÜß]+/g);
            if (!matches) return [];
            return [...new Set(matches)];
        }

        function getArticleHashtags(article) {
            const cat = feedCategoryMap[article.feedUrl] || 'custom';
            const topicList = topicHashtags[cat] || [];
            const text = (article.title + ' ' + (article.content || article.description || '')).toLowerCase();
            return topicList.filter(tag => text.includes(tag.toLowerCase())).slice(0, 5);

        function hasArticlesForKeyword(kw) {
            if (!allArticles || !kw) return false;
            const q = kw.toLowerCase();
            return allArticles.some(a => {

                return text.includes(q);
            });
        }

            if (!keywords || !keywords.length || !allArticles || !allArticles.length) return false;
            return keywords.some(kw => hasArticlesForKeyword(kw));
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            if (!tabBar) return;
            
            let tabsHtml = '<div class="tab active" data-filter="all" onclick="setFilter(\'all\')">Alle</div>';
            
            categoryOrder.forEach(cat => {
                tabsHtml += '<div class="tab" data-filter="cat:' + cat + '" onclick="setFilter(\'cat:' + cat + '\')">' + (categoryNames[cat] || cat) + '</div>';
            });
            
            if (keywords && keywords.length && allArticles && allArticles.length) {
                if (hasArticlesForAnyKeyword()) {
                    tabsHtml += '<div class="tab" data-filter="kw:all" onclick="setFilter(\'kw:all\')">Keywords</div>';
                }
                keywords.forEach(kw => {
                    if (hasArticlesForKeyword(kw)) {
                        tabsHtml += '<div class="tab" data-filter="kw:' + kw + '" onclick="setFilter(\'kw:' + kw + '\')">' + kw + '</div>';
                    }
                });
            }
            
            const activeFilter = localStorage.getItem('articleFilter') || 'all';
            tabBar.innerHTML = tabsHtml;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.filter === activeFilter);
            });
            
            tabBar.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('dragstart', handleTabDragStart);
                tab.addEventListener('dragend', handleTabDragEnd);
                tab.addEventListener('dragover', handleTabDragOver);
                tab.addEventListener('drop', handleTabDrop);
            });
        }

        let draggedTab = null;

        function handleTabDragStart(e) {
            draggedTab = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleTabDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
            draggedTab = null;
        }

        function handleTabDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.tab');
            if (target && target !== draggedTab) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        }

        function handleTabDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.tab');
            if (!target || target === draggedTab) return;
            
            const fromFilter = draggedTab.dataset.filter;
            const toFilter = target.dataset.filter;
            
            const tabs = Array.from(document.querySelectorAll('.tab'));
            const fromIdx = tabs.findIndex(t => t.dataset.filter === fromFilter);
            const toIdx = tabs.findIndex(t => t.dataset.filter === toFilter);
            
            if (fromIdx > -1 && toIdx > -1) {
                if (fromFilter.startsWith('kw:')) {
                    const kwFrom = fromFilter.substring(3);
                    const kwTo = toFilter.substring(3);
                    const fromKIdx = keywords.indexOf(kwFrom);
                    const toKIdx = keywords.indexOf(kwTo);
                    if (fromKIdx > -1 && toKIdx > -1) {
                        const [moved] = keywords.splice(fromKIdx, 1);
                        keywords.splice(toKIdx, 0, moved);
                        localStorage.setItem('keywords', JSON.stringify(keywords));
                        renderKeywordList();
                    }
                }
                renderTabs();
                setFilter(toFilter);
            }
        }

            const allCategories = { ...feedData };
            if (customFeeds.length) allCategories.custom = customFeeds;
            
            const title = categoryNames[category] || category.charAt(0).toUpperCase() + category.slice(1);
            const feeds = allCategories[category] || [];
            
            let html = `<div class="back-btn" onclick="renderFeedLists()">← Zurück</div>`;
            
            if (category !== 'custom') {
                html += `<div class="category-actions">
                    <button class="small-btn" onclick="toggleAllInCategory('${category}', true)">Alle auswählen</button>
                    <button class="small-btn" onclick="toggleAllInCategory('${category}', false)">Alle abwählen</button>
                </div>`;
            }
            
            html += `<div class="feed-category-title">${title}</div>`;
            
            if (category === 'custom') {
                html += feeds.map((feed, idx) => `
                    <div class="feed-item" data-url="${feed.url}" data-category="${category}" data-idx="${idx}" onclick="toggleFeed('${feed.url}')">
                        <div class="feed-toggle ${enabledFeeds.includes(feed.url) ? 'checked' : ''}"></div>
                        <span>${feed.name}</span>
                        <svg class="delete-icon" onclick="event.stopPropagation();deleteCustomFeed('${feed.url}', '${feed.name}')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </div>
                `).join('');
            } else {
                html += feeds.map((feed, idx) => `
                    <div class="feed-item" data-url="${feed.url}" data-category="${category}" data-idx="${idx}" onclick="toggleFeed('${feed.url}')">
                        <div class="feed-toggle ${enabledFeeds.includes(feed.url) ? 'checked' : ''}"></div>
                        <span>${feed.name}</span>
                    </div>
                `).join('');
            }
            
            container.innerHTML = html;
            
            container.querySelectorAll('.feed-item').forEach(item => {
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
            });
        }

        let draggedItem = null;
        let draggedCategory = null;

        function handleDragStart(e) {
            draggedItem = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.feed-item').forEach(item => item.classList.remove('drag-over'));
            draggedItem = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.feed-item');
            if (target && target !== draggedItem) {
                document.querySelectorAll('.feed-item').forEach(item => item.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.feed-item');
            if (!target || target === draggedItem) return;
            
            const fromCategory = draggedItem.dataset.category;
            const fromIdx = parseInt(draggedItem.dataset.idx);
            const toCategory = target.dataset.category;
            const toIdx = parseInt(target.dataset.idx);
            
            const fromFeeds = feedData[fromCategory];
            const [movedFeed] = fromFeeds.splice(fromIdx, 1);
            
            if (toCategory === fromCategory) {
                fromFeeds.splice(toIdx, 0, movedFeed);
            } else {
                feedData[toCategory].splice(toIdx, 0, movedFeed);
                feedCategoryMap[movedFeed.url] = toCategory;
            }
            
            renderFeedLists();
        }

        function toggleFeed(url) {
            if (isBrokenFeed(url)) {
                alert('Dieser Feed ist defekt und kann nicht verwendet werden.');
                return;
            }
            if (enabledFeeds.includes(url)) {
                enabledFeeds = enabledFeeds.filter(f => f !== url);
            } else {
                enabledFeeds.push(url);
            }
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            renderFeedLists();
            loadFeeds();
        }

        function toggleAllInCategory(category, enable) {
            const allCategories = { ...feedData };
            if (customFeeds.length) allCategories.custom = customFeeds;
            const feeds = allCategories[category] || [];
            
            feeds.forEach(feed => {
                if (enable && !enabledFeeds.includes(feed.url)) {
                    enabledFeeds.push(feed.url);
                } else if (!enable) {
                    enabledFeeds = enabledFeeds.filter(f => f !== feed.url);
                }
            });
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            showCategoryFeeds(category);
        }

        function deleteCustomFeed(url, name) {
            if (!confirm('Feed "' + name + '" wirklich löschen?')) return;
            customFeeds = customFeeds.filter(f => f.url !== url);
            enabledFeeds = enabledFeeds.filter(f => f !== url);
            localStorage.setItem('customFeeds', JSON.stringify(customFeeds));
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            showCategoryFeeds('custom');
        }

        function handleCategoryDragStart(e) {
            draggedCategory = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleCategoryDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.feed-category-title').forEach(h => h.classList.remove('drag-over'));
            draggedCategory = null;
        }

        function handleCategoryDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.feed-category-title');
            if (target && target !== draggedCategory) {
                document.querySelectorAll('.feed-category-title').forEach(h => h.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        }

        function handleCategoryDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.feed-category-title');
            if (!target || target === draggedCategory) return;
            
            const fromCat = draggedCategory.dataset.category;
            const toCat = target.dataset.category;
            
            const fromIdx = categoryOrder.indexOf(fromCat);
            const toIdx = categoryOrder.indexOf(toCat);
            
            if (fromIdx > -1 && toIdx > -1) {
                const [moved] = categoryOrder.splice(fromIdx, 1);
                categoryOrder.splice(toIdx, 0, moved);
                localStorage.setItem('categoryOrder', JSON.stringify(categoryOrder));
                renderFeedLists();
                renderTabs();
            }
        }

        function moveSwipe(e, card) {
            if (!cardEl || card !== cardEl) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - swipeStartX;
            
            card.classList.remove('swiping-left', 'swiping-right');
            if (diff < -20) {
                card.classList.add('swiping-left');
                swipeDirection = 'left';
            } else if (diff > 20) {
                card.classList.add('swiping-right');
                swipeDirection = 'right';
            }
            
            const rotate = diff * 0.03;
            card.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
        }

        function endSwipe(e, card) {
            if (!cardEl || card !== cardEl) return;
            
            const diff = swipeStartX - e.changedTouches[0].clientX;
            
            if (diff > 80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(-400px) rotate(-20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    if (!hiddenItems.some(h => h.link === link)) {
                        hiddenItems.push({ link: link, title: card.querySelector('.article-title')?.textContent || 'Artikel', feedName: card.querySelector('.feed-name')?.textContent || 'Unbekannt', pubDate: new Date().toISOString() });
                        localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                        updateCounts();
                    }
                    card.style.display = 'none';
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.zIndex = '';
                }, 300);
            } else if (diff < -80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(400px) rotate(20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    if (!readLaterItems.some(r => r.link === link)) {
                        readLaterItems.push({ link: link, title: card.querySelector('.article-title')?.textContent || 'Artikel', feedName: card.querySelector('.feed-name')?.textContent || 'Unbekannt', pubDate: new Date().toISOString() });
                        localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
                        updateCounts();
                    }
                    card.style.display = 'none';
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.zIndex = '';
                }, 300);
            } else {
                card.classList.remove('swiping-left', 'swiping-right');
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(0) rotate(0)';
            }
            
            cardEl = null;
        }

        function filterArticles(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.article-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? '' : 'none';
            });
        }

        function setFilter(filter) {
            articleFilter = filter;
            localStorage.setItem('articleFilter', filter);
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.filter === filter);
            });
            renderArticles(filter);
        }

        function openArticle(link) {
            if (!hiddenItems.some(h => h.link === link)) {
                const article = allArticles.find(a => a.link === link);
                hiddenItems.push({ 
                    link: link, 
                    title: article?.title || 'Artikel', 
                    feedName: article?.feedName || 'Unbekannt', 
                    pubDate: article?.pubDate || new Date().toISOString() 
                });
                localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                updateCounts();
            }
            window.open(link, '_self');
            setTimeout(renderArticles, 500);
        }

        function openHashtag(tag) {
            window.open('https://twitter.com/hashtag/' + tag.substring(1), '_blank');
        }

        function updateCounts() {
            document.getElementById('hiddenCount').textContent = hiddenItems.length;
            document.getElementById('readLaterCount').textContent = readLaterItems.length;
            document.getElementById('keywordCount').textContent = keywords.length;
        }

        function renderReadLaterList() {
            const later = readLaterItems;
            const container = document.getElementById('readLaterList');
            
            if (!later.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel gespeichert.</div>';
                return;
            }

            container.innerHTML = `
                <button class="action-btn" onclick="restoreAllReadLater()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${later.map(a => `
                        <div class="article-card" data-link="${a.link}" ontouchstart="startSwipe(event, this)" ontouchmove="moveSwipeRL(event, this)" ontouchend="endSwipeRL(event, this)">
                            <div class="swipe-hint">← Ausblenden · Später lesen →</div>
                            <div onclick="openArticle('${a.link}')">
                                ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                                <div class="article-title">${a.title}</div>
                                <div class="article-meta"><span>${a.feedName}</span></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function moveSwipeRL(e, card) {
            if (!cardEl || card !== cardEl) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - swipeStartX;
            
            card.classList.remove('swiping-left', 'swiping-right');
            if (diff < -20) card.classList.add('swiping-left');
            
            const rotate = diff * 0.03;
            card.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
        }

        function endSwipeRL(e, card) {
            if (!cardEl || card !== cardEl) return;
            const diff = swipeStartX - e.changedTouches[0].clientX;
            
            if (diff > 80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(-400px) rotate(-20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    readLaterItems = readLaterItems.filter(l => l !== link);
                    localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
                    updateCounts();
                    renderReadLaterList();
                }, 300);
            } else {
                card.classList.remove('swiping-left');
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(0) rotate(0)';
            }
            cardEl = null;
        }

        function restoreAllReadLater() {
            readLaterItems = [];
            localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
            updateCounts();
            renderReadLaterList();
            renderArticles();
        }

        function restoreReadLater(link) {
            readLaterItems = readLaterItems.filter(r => r.link !== link);
            localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
            updateCounts();
            renderReadLaterList();
            renderArticles();
        }

        function renderHiddenList() {
            const hidden = hiddenItems;
            const container = document.getElementById('hiddenList');
            
            if (!hidden.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel versteckt.</div>';
                return;
            }

            container.innerHTML = `
                <button class="action-btn" onclick="restoreAllHidden()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${hidden.map(a => `
                        <div class="article-card" onclick="restoreHidden('${a.link}')">
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function restoreHidden(link) {
            hiddenItems = hiddenItems.filter(h => h.link !== link);
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateCounts();
            renderHiddenList();
            renderArticles();
        }

        function restoreAllHidden() {
            hiddenItems = [];
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateCounts();
            renderHiddenList();
            renderArticles();
        }

        function renderKeywordList() {
            const container = document.getElementById('keywordList');
            container.innerHTML = keywords.map(kw => `
                <div class="keyword-tag" onclick="setFilter('kw:${kw}')">
                    ${kw}
                    <span class="remove" onclick="event.stopPropagation(); removeKeyword('${kw}')">×</span>
                </div>
            `).join('');
        }

        function addKeyword() {
            const input = document.getElementById('keywordInput');
            const kw = input.value.trim();
            if (kw && !keywords.includes(kw)) {
                keywords.push(kw);
                localStorage.setItem('keywords', JSON.stringify(keywords));
                input.value = '';
                renderKeywordList();
                updateCounts();
                renderArticles();
            }
        }

        function removeKeyword(kw) {
            keywords = keywords.filter(k => k !== kw);
            localStorage.setItem('keywords', JSON.stringify(keywords));
            renderKeywordList();
            updateCounts();
            if (articleFilter === 'kw:' + kw) {
                setFilter('all');
            } else {
                renderArticles();
            }
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        function openOverlay(name) {
            document.getElementById('overlay-' + name).classList.add('active');
            document.getElementById('sidebar').classList.remove('active');
            
            if (name === 'hidden') renderHiddenList();
            if (name === 'readLater') renderReadLaterList();
            if (name === 'keywords') renderKeywordList();
        }

        function closeOverlay() {
            document.querySelectorAll('.overlay-page').forEach(o => o.classList.remove('active'));
        }

        let ptrStart = 0;
        function initPullToRefresh() {
            const main = document.getElementById('mainContent');
            main.addEventListener('touchstart', e => {
                if (main.scrollTop > 0) return;
                ptrStart = e.touches[0].clientY;
            }, { passive: true });
            
            main.addEventListener('touchmove', e => {
                if (main.scrollTop > 0) return;
                const diff = e.touches[0].clientY - ptrStart;
                const indicator = document.getElementById('pullIndicator');
                if (diff > 60) {
                    indicator.style.display = 'block';
                    indicator.textContent = '↓ Loslassen zum Aktualisieren';
                }
            }, { passive: true });
            
            main.addEventListener('touchend', e => {
                const indicator = document.getElementById('pullIndicator');
                if (indicator.style.display === 'block') {
                    indicator.textContent = 'Lade...';
                    loadFeeds();
                    setTimeout(() => indicator.style.display = 'none', 1000);
                }
            }, { passive: true });
        }

        init();
    </script>
</body>
</html>
