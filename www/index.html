<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Menzis RSS v5.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8c00;
            --on-primary: #002200;
            --primary-container: #004400;
            --secondary: #ff9933;
            --surface: #0a0a0a;
            --surface-container: #1a1a1a;
            --surface-container-high: #2a2a2a;
            --on-surface: #e0e0e0;
            --on-surface-variant: #909090;
            --outline: #444444;
            --error: #ff5555;
            --elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            --elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
            --elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
            --radius-small: 8px;
            --radius-medium: 12px;
            --radius-large: 16px;
            --radius-extra-large: 28px;
        }

        :root[data-theme="light"] {
            --primary: #1a73e8;
            --on-primary: #ffffff;
            --primary-container: #d4e4ff;
            --secondary: #cc6600;
            --surface: #f0f0f0;
            --surface-container: #ffffff;
            --surface-container-high: #e8e8e8;
            --on-surface: #1a1a1a;
            --on-surface-variant: #555555;
            --outline: #bbbbbb;
            --error: #cc0000;
        }

        :root[data-theme="dark"] {
            --primary: #ff8c00;
            --on-primary: #002200;
            --primary-container: #4d2800;
            --secondary: #ff9933;
            --surface: #0a0a0a;
            --surface-container: #1a1a1a;
            --surface-container-high: #2a2a2a;
            --on-surface: #e0e0e0;
            --on-surface-variant: #909090;
            --outline: #444444;
            --error: #ff5555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--surface-container);
            box-shadow: var(--elevation-2);
            z-index: 100;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .hamburger:hover { background: var(--surface-container-high); }
        .hamburger span {
            width: 18px;
            height: 2px;
            background: var(--on-surface);
            margin: 0 auto;
            border-radius: 1px;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--secondary);
            flex: 1;
            letter-spacing: 0.1px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            padding: 0.5rem 0.75rem 0.5rem 2.25rem;
            border-radius: var(--radius-extra-large);
            width: 120px;
            font-size: 0.9rem;
            transition: width 0.3s, background 0.2s, border-color 0.2s;
        }
        .search-input:focus { 
            width: 180px; 
            outline: none; 
            background: var(--surface-container-high);
            border-color: var(--primary);
        }
        .search-input::placeholder { color: var(--on-surface-variant); }
        
        .search-icon {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            color: var(--on-surface-variant);
        }

        .tab-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--surface-container);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-extra-large);
            background: var(--surface);
            color: var(--on-surface-variant);
            font-size: 0.8125rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .tab:hover { background: var(--surface-container-high); }
        .tab.active {
            background: var(--primary);
            color: var(--on-primary);
            box-shadow: var(--elevation-1);
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .article-card {
            background: var(--surface-container);
            border-radius: var(--radius-medium);
            padding: 1rem;
            box-shadow: var(--elevation-1);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .article-card:hover { box-shadow: var(--elevation-2); }
        .article-card:active { transform: scale(0.98); }

        .article-card .swipe-bg-left {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: var(--error);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card .swipe-bg-right {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card.swiping-left .swipe-bg-left { opacity: 1; }
        .article-card.swiping-right .swipe-bg-right { opacity: 1; }
        .article-card .swipe-label {
            color: white;
            font-weight: 500;
            font-size: 0.75rem;
            text-align: center;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .article-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-small);
            margin-bottom: 0.75rem;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: var(--on-surface);
        }

        .article-meta {
            font-size: 0.75rem;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .article-meta .feed-name {
            color: var(--primary);
            font-weight: 500;
        }
        .article-meta .dot {
            width: 3px;
            height: 3px;
            background: var(--on-surface-variant);
            border-radius: 50%;
        }

        .no-feeds, .error-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--on-surface-variant);
        }
        .no-feeds h3, .error-msg h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--on-surface);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            gap: 1rem;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--surface-container-high);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--on-surface-variant); font-size: 0.875rem; }

        .pull-indicator {
            text-align: center;
            padding: 0.75rem;
            color: var(--primary);
            font-size: 0.875rem;
            display: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            max-width: 85vw;
            height: 100vh;
            background: var(--surface-container);
            box-shadow: var(--elevation-3);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--outline);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-title { font-size: 1.25rem; font-weight: 500; color: var(--on-surface); }
        .close-sidebar {
            background: none;
            border: none;
            color: var(--on-surface);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .close-sidebar:hover { background: var(--surface-container-high); }

        .nav-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid var(--outline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--surface-container-high); }
        .nav-item-label { font-size: 1rem; color: var(--on-surface); }
        .nav-count {
            background: var(--primary);
            color: var(--on-primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .overlay-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface);
            z-index: 300;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .overlay-page.active { display: flex; }

        .overlay-header {
            padding: 1rem 0.5rem;
            background: var(--surface-container);
            border-bottom: 1px solid var(--outline);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--on-surface);
            padding: 0.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: background 0.2s;
        }
        .close-btn:hover { background: var(--surface-container-high); }
        .overlay-title { font-size: 1.25rem; font-weight: 500; flex: 1; color: var(--on-surface); }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .feed-category-title {
            padding: 1rem 0.75rem 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            cursor: pointer;
            border-radius: var(--radius-small);
            transition: background 0.2s;
            touch-action: manipulation;
        }
        .feed-item:hover { background: var(--surface-container-high); }
        .feed-item.dragging { opacity: 0.5; background: var(--primary); }
        .feed-item.drag-over { border-top: 2px solid var(--primary); }

        .feed-toggle {
            width: 24px;
            height: 24px;
            border: 2px solid var(--outline);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .feed-toggle.checked {
            background: var(--primary);
            border-color: var(--primary);
        }
        .feed-toggle.checked::after {
            content: '✓';
            color: var(--on-primary);
            font-size: 0.875rem;
            font-weight: bold;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            padding: 1rem;
        }

        .theme-btn {
            padding: 1rem;
            border-radius: var(--radius-medium);
            cursor: pointer;
            border: 1px solid var(--outline);
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--on-surface);
        }
        .theme-btn:hover { box-shadow: var(--elevation-2); }
        .theme-btn.active { border-color: var(--primary); box-shadow: var(--elevation-2); }

        .custom-url-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            border-radius: var(--radius-small);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .custom-url-input:focus { outline: none; border-color: var(--primary); }

        .add-btn {
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: box-shadow 0.2s;
        }
        .add-btn:hover { box-shadow: var(--elevation-2); }

        .action-btn {
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-small);
            cursor: pointer;
            font-weight: 500;
            margin: 1rem;
            display: block;
            width: calc(100% - 2rem);
        }

        .keyword-input-container {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        .keyword-input {
            flex: 1;
            padding: 0.75rem;
            background: var(--surface-container);
            border: 1px solid var(--outline);
            color: var(--on-surface);
            border-radius: var(--radius-small);
            font-size: 1rem;
        }
        .keyword-input:focus { outline: none; border-color: var(--primary); }

        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0 1rem 1rem;
        }
        .keyword-tag {
            background: var(--primary);
            color: var(--on-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-extra-large);
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .keyword-tag .remove {
            font-size: 1rem;
            line-height: 1;
            opacity: 0.8;
        }
        .keyword-tag .remove:hover { opacity: 1; }

        .fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            box-shadow: var(--elevation-3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 50;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: var(--elevation-3); }
        .fab:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
        <div class="header-title">Menzis RSS <small>v5.9</small></div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" class="search-input" placeholder="Suchen..." oninput="filterArticles(this.value)">
        </div>
    </div>

    <div class="tab-bar" id="tabBar"></div>

    <div id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
        </div>
        <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Menü</span>
            <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div class="nav-item" onclick="openOverlay('feeds')">
            <span class="nav-item-label">Feed-Auswahl</span>
        </div>
        <div class="nav-item" onclick="openOverlay('url')">
            <span class="nav-item-label">Eigene URL</span>
        </div>
        <div class="nav-item" onclick="openOverlay('theme')">
            <span class="nav-item-label">Design</span>
        </div>
        <div class="nav-item" onclick="openOverlay('readLater')">
            <span class="nav-item-label">Später lesen</span>
            <span id="readLaterCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="openOverlay('keywords')">
            <span class="nav-item-label">Keywords</span>
            <span id="keywordCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="openOverlay('hidden')">
            <span class="nav-item-label">Versteckte Artikel</span>
            <span id="hiddenCount" class="nav-count">0</span>
        </div>
        <div class="nav-item" onclick="resetApp()">
            <span class="nav-item-label">App zurücksetzen</span>
        </div>
    </div>

    <div class="overlay-page" id="overlay-feeds">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Feed-Auswahl</span>
        </div>
        <div class="overlay-content" id="feedLists"></div>
    </div>

    <div class="overlay-page" id="overlay-theme">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Design</span>
        </div>
        <div class="overlay-content">
            <div class="feed-category-title">Helligkeit</div>
            <div class="theme-selector" style="margin-top:0.5rem;">
                <div class="theme-btn" id="btnLight" onclick="setThemeMode('light')">● Hell</div>
                <div class="theme-btn" id="btnDark" onclick="setThemeMode('dark')">● Dunkel</div>
                <div class="theme-btn" id="btnSystem" onclick="setThemeMode('system')">◐ Auto</div>
            </div>
        </div>
    </div>

    <div class="overlay-page" id="overlay-url">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Eigene URL hinzufügen</span>
        </div>
        <div class="overlay-content">
            <input type="text" class="custom-url-input" id="customUrl" placeholder="https://...">
            <button class="add-btn" onclick="addCustomFeed()">Hinzufügen</button>
        </div>
    </div>

    <div class="overlay-page" id="overlay-readLater">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Später lesen</span>
        </div>
        <div class="overlay-content" id="readLaterList"></div>
    </div>

    <div class="overlay-page" id="overlay-keywords">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Keywords</span>
        </div>
        <div class="overlay-content">
            <div class="keyword-input-container">
                <input type="text" class="keyword-input" id="keywordInput" placeholder="Keyword z.B. Schwerin" onkeydown="if(event.key==='Enter')addKeyword()">
                <button class="add-btn" onclick="addKeyword()">Hinzufügen</button>
            </div>
            <div class="keyword-list" id="keywordList"></div>
        </div>
    </div>

    <div class="overlay-page" id="overlay-hidden">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Versteckte Artikel</span>
        </div>
        <div class="overlay-content" id="hiddenList"></div>
    </div>

    <script>
        const feedData = {
            news: [
                { name: 'Tagesschau', url: 'https://www.tagesschau.de/xml/rss2' },
                { name: 'SPIEGEL', url: 'https://www.spiegel.de/schlagzeilen/index.rss' },
                { name: 'FAZ', url: 'https://www.faz.net/rss/aktuell' },
                { name: 'NDR MV', url: 'https://www.ndr.de/nachrichten/mecklenburg-vorpommern/index~rss2.xml' },
                { name: 'NDR SH', url: 'https://www.ndr.de/nachrichten/schleswig-holstein/index~rss2.xml' },
                { name: 'NDR NI', url: 'https://www.ndr.de/nachrichten/niedersachsen/index~rss2.xml' },
                { name: 'NDR HH', url: 'https://www.ndr.de/nachrichten/hamburg/index~rss2.xml' },
                { name: 'NachDenkSeiten', url: 'https://www.nachdenkseiten.de/?feed=rss2' },
                { name: 'Cicero', url: 'https://www.cicero.de/rss.xml' },
                { name: 'Tichys Einblick', url: 'https://www.tichyseinblick.de/feed/' },
                { name: 'Telepolis', url: 'https://www.telepolis.de/news-atom.xml' },
                { name: 'Apollo News', url: 'https://apollo-news.de/feed/' },
                { name: 'Junge Freiheit', url: 'https://jungefreiheit.de/feed/' },
                { name: 'Die Welt', url: 'https://www.welt.de/feeds/latest.rss' },
                { name: 'n-tv', url: 'https://www.n-tv.de/rss' },
                { name: 'Handelsblatt', url: 'https://www.handelsblatt.com/contentexpo/rss/aktuell' },
                { name: 'Tagesspiegel', url: 'https://www.tagesspiegel.de/feed' },
                { name: 'Focus', url: 'https://www.focus.de/feed' }
            ],
            tech: [
                { name: 'Futurezone', url: 'https://futurezone.de/rss' },
                { name: 'Caschy', url: 'https://stadt-bremerhaven.de/feed/' },
                { name: 'Netzpolitik', url: 'https://netzpolitik.org/feed/' },
                { name: 't3n', url: 'https://t3n.de/rss.xml' },
                { name: 'Kuketz IT', url: 'https://www.kuketz-blog.de/feed/' },
                { name: 'ComputerBase', url: 'https://www.computerbase.de/rss/news.xml' },
                { name: 'Inside Digital', url: 'https://www.inside-digital.de/feed' },
                { name: 'Heise Online', url: 'https://www.heise.de/rss/' },
                { name: 'Golem.de', url: 'https://www.golem.de/rss.php' },

            ]
        };

        const categoryNames = {
            news: 'Nachrichten', android: 'Android', apple: 'Apple', tech: 'Tech',
            cooking: 'Kochen', lifestyle: 'Lifestyle', finance: 'Wirtschaft', custom: 'Eigene'
        };

        const categoryOrder = ['news', 'android', 'apple', 'tech', 'cooking', 'lifestyle', 'finance'];

        const brokenFeeds = [
            'computerbild.de', 'turingmagazin.de', 'zeit.de', 'sueddeutsche.de', 
            'quarks.de', 'klimareporter.de', 'mannbackt.de',
            'valentinas-kochbuch.de', 'highfoodality.de'
        ];

        function isBrokenFeed(url) {
            return brokenFeeds.some(b => url.includes(b));
        }

        const allKnownUrls = Object.values(feedData).flat().map(f => f.url);
        
        let enabledFeeds = JSON.parse(localStorage.getItem('enabledFeeds'));
        
        if (!enabledFeeds || !Array.isArray(enabledFeeds) || enabledFeeds.length === 0) {
            enabledFeeds = ['https://www.tagesschau.de/xml/rss2'];
        } else {
            enabledFeeds = enabledFeeds.filter(url => 
                allKnownUrls.includes(url) && !isBrokenFeed(url)
            );
            if (enabledFeeds.length === 0) {
                enabledFeeds = ['https://www.tagesschau.de/xml/rss2'];
            }
        }
        
        localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
        
        let hiddenItems = JSON.parse(localStorage.getItem('hiddenItems')) || [];
        let readLaterItems = JSON.parse(localStorage.getItem('readLaterItems')) || [];
        let keywords = JSON.parse(localStorage.getItem('keywords')) || [];
        let currentTheme = localStorage.getItem('theme') || 'dark';
        let articleFilter = localStorage.getItem('articleFilter') || 'all';
        let customFeeds = JSON.parse(localStorage.getItem('customFeeds')) || [];
        let allArticles = [];
        
        const feedCategoryMap = {};
        Object.entries(feedData).forEach(([cat, feeds]) => {
            feeds.forEach(f => feedCategoryMap[f.url] = cat);
        });
        customFeeds.forEach(f => feedCategoryMap[f.url] = 'custom');

        function getArticleAge(pubDate) {
            const now = new Date();
            const pub = new Date(pubDate);
            const diffMs = now - pub;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            
            if (diffMins < 1) return 'Gerade eben';
            if (diffMins < 60) return 'vor ' + diffMins + ' Min';
            if (diffHours < 24) return 'vor ' + diffHours + ' Std';
            if (diffDays === 1) return 'Gestern';
            if (diffDays < 7) return 'vor ' + diffDays + ' Tagen';
            return pub.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        }

        function getReadingTime(title) {
            const words = title.split(/\s+/).length;
            const mins = Math.max(1, Math.ceil(words / 200));
            return mins + ' Min';
        }

        function init() {
            try {
                applyThemeMode();
                updateThemeButtons();
                renderFeedLists();
                renderKeywordList();
                updateCounts();
                loadFeeds();
            } catch (e) {
                console.error('init error:', e);
                document.getElementById('mainContent').innerHTML = '<div class="error-msg"><h3>Fehler beim Starten</h3>Bitte App neu laden.</div>';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function setThemeMode(mode) {
            localStorage.setItem('themeMode', mode);
            applyThemeMode();
            updateThemeButtons();
        }

        function applyThemeMode() {
            const mode = localStorage.getItem('themeMode') || 'dark';
            if (mode === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', mode);
            }
        }

        function updateThemeButtons() {
            const mode = localStorage.getItem('themeMode') || 'dark';
            document.getElementById('btnLight')?.classList.toggle('active', mode === 'light');
            document.getElementById('btnDark')?.classList.toggle('active', mode === 'dark');
            document.getElementById('btnSystem')?.classList.toggle('active', mode === 'system');
        }

        function renderFeedLists() {
            const container = document.getElementById('feedLists');
            let html = '';
            
            const allCategories = { ...feedData };
            if (customFeeds.length) allCategories.custom = customFeeds;

            Object.entries(allCategories).forEach(([category, feeds]) => {
                const title = categoryNames[category] || category.charAt(0).toUpperCase() + category.slice(1);
                html += `<div class="feed-category-title">${title}</div>`;
                html += feeds.map((feed, idx) => `
                    <div class="feed-item" draggable="true" data-url="${feed.url}" data-category="${category}" data-idx="${idx}" onclick="toggleFeed('${feed.url}')">
                        <div class="feed-toggle ${enabledFeeds.includes(feed.url) ? 'checked' : ''}"></div>
                        <span>${feed.name}</span>
                    </div>
                `).join('');
            });
            
            container.innerHTML = html;
            
            container.querySelectorAll('.feed-item').forEach(item => {
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
            });
        }

        let draggedItem = null;

        function handleDragStart(e) {
            draggedItem = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.feed-item').forEach(item => item.classList.remove('drag-over'));
            draggedItem = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.feed-item');
            if (target && target !== draggedItem) {
                document.querySelectorAll('.feed-item').forEach(item => item.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.feed-item');
            if (!target || target === draggedItem) return;
            
            const fromCategory = draggedItem.dataset.category;
            const fromIdx = parseInt(draggedItem.dataset.idx);
            const toCategory = target.dataset.category;
            const toIdx = parseInt(target.dataset.idx);
            
            const fromFeeds = feedData[fromCategory];
            const [movedFeed] = fromFeeds.splice(fromIdx, 1);
            
            if (toCategory === fromCategory) {
                fromFeeds.splice(toIdx, 0, movedFeed);
            } else {
                feedData[toCategory].splice(toIdx, 0, movedFeed);
                feedCategoryMap[movedFeed.url] = toCategory;
            }
            
            renderFeedLists();
        }

        function toggleFeed(url) {
            if (isBrokenFeed(url)) {
                alert('Dieser Feed ist defekt und kann nicht verwendet werden.');
                return;
            }
            if (enabledFeeds.includes(url)) {
                enabledFeeds = enabledFeeds.filter(f => f !== url);
            } else {
                enabledFeeds.push(url);
            }
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            renderFeedLists();
            loadFeeds();
        }

        function addCustomFeed() {
            const url = document.getElementById('customUrl').value.trim();
            if (!url) return;
            
            if (isBrokenFeed(url)) {
                alert('Dieser Feed ist defekt und kann nicht verwendet werden.');
                return;
            }
            
            const name = url.split('/')[2] || 'Custom';
            customFeeds.push({ name, url });
            localStorage.setItem('customFeeds', JSON.stringify(customFeeds));
            
            if (!enabledFeeds.includes(url)) {
                enabledFeeds.push(url);
                localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            }
            
            document.getElementById('customUrl').value = '';
            feedCategoryMap[url] = 'custom';
            renderFeedLists();
            loadFeeds();
            closeOverlay();
        }

        function loadFeeds() {
            if (!enabledFeeds || !enabledFeeds.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds"><h3>Keine Feeds ausgewählt</h3>Drücke ☰ für Menü → Feed-Auswahl</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="loading"><div class="loading-spinner"></div></div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;

            allArticles = [];
            let loaded = 0;
            let rendered = false;

            function checkAndRender() {
                if (!rendered && loaded >= enabledFeeds.length) {
                    rendered = true;
                    renderArticles();
                }
            }

            enabledFeeds.forEach((url, index) => {
                setTimeout(() => fetchFeed(url), index * 500);
            });

            function fetchFeed(url) {
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            processFeedData({ feed: { title: data.feed?.title || url.split('/')[2] }, items: data.items }, url);
                        }
                        loaded++;
                        checkAndRender();
                    })
                    .catch(() => {
                        loaded++;
                        checkAndRender();
                    });
            }

            setTimeout(() => {
                if (loaded < enabledFeeds.length) {
                    loaded = enabledFeeds.length;
                    renderArticles();
                }
            }, 20000);
        }

        function processFeedData(data, url) {
            const feedName = data.feed.title || url.split('/')[2];
            data.items.slice(0, 30).forEach(item => {
                let thumb = item.thumbnail || '';
                
                if (!thumb && item.content) {
                    const m = item.content.match(/<img[^>]+src=["']([^"']+)["']/);
                    if (m) thumb = m[1];
                }
                if (!thumb && item.description) {
                    const m = item.description.match(/<img[^>]+src=["']([^"']+)["']/);
                    if (m) thumb = m[1];
                }
                if (!thumb && item.enclosure && item.enclosure.type && item.enclosure.type.startsWith('image/')) {
                    thumb = item.enclosure.thumbnail || item.enclosure.link || '';
                }
                if (thumb && (thumb.includes('follow.it') || thumb.includes('-150x150') || thumb.includes('150-150') || thumb.includes('vg06.met.vgwort'))) {
                    thumb = '';
                }
                
                allArticles.push({
                    title: item.title,
                    link: item.link,
                    pubDate: item.pubDate,
                    thumbnail: thumb,
                    feedName,
                    feedUrl: url
                });
            });
            if (loaded >= enabledFeeds.length) renderArticles();
        }

        function renderTabs() {
            const categoryCounts = {};
            allArticles
                .filter(a => !hiddenItems.includes(a.link) && !readLaterItems.includes(a.link))
                .forEach(a => {
                    const cat = feedCategoryMap[a.feedUrl] || 'other';
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });

            let tabHtml = '<div class="tab' + (articleFilter === 'all' ? ' active' : '') + '" data-filter="all" onclick="setFilter(\'all\')">Alle</div>';
            
            categoryOrder.forEach(cat => {
                if (categoryCounts[cat] && categoryNames[cat]) {
                    tabHtml += '<div class="tab' + (articleFilter === cat ? ' active' : '') + '" data-filter="' + cat + '" onclick="setFilter(\'' + cat + '\')">' + categoryNames[cat] + '</div>';
                }
            });

            keywords.forEach(kw => {
                tabHtml += '<div class="tab' + (articleFilter === 'kw:' + kw ? ' active' : '') + '" data-filter="kw:' + kw + '" onclick="setFilter(\'kw:' + kw + '\')">' + kw + '</div>';
            });

            document.getElementById('tabBar').innerHTML = tabHtml;
        }

        function renderArticles() {
            let articles = allArticles
                .filter(a => !hiddenItems.includes(a.link) && !readLaterItems.includes(a.link))
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, 100);

            if (articleFilter.startsWith('kw:')) {
                const kw = articleFilter.substring(3);
                articles = articles.filter(a => a.title.toLowerCase().includes(kw.toLowerCase()));
            } else if (articleFilter !== 'all') {
                articles = articles.filter(a => feedCategoryMap[a.feedUrl] === articleFilter);
            }

            renderTabs();

            if (!allArticles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
                return;
            }

            if (!articles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds"><h3>Keine Artikel vorhanden</h3>Alle ausgeblendet oder keine Feeds aktiviert.</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="articles-list">
                    ${articles.map(a => `
                        <div class="article-card" data-link="${a.link}" ontouchstart="startSwipe(event, this)" ontouchmove="moveSwipe(event, this)" ontouchend="endSwipe(event, this)">
                            <div class="swipe-bg-left"><span class="swipe-label">Ausblenden</span></div>
                            <div class="swipe-bg-right"><span class="swipe-label">Später lesen</span></div>
                            <div onclick="openArticle('${a.link}')">
                                ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                                <div class="article-title">${a.title}</div>
                                <div class="article-meta"><span class="feed-name">${a.feedName}</span><span class="dot"></span>${getArticleAge(a.pubDate)}<span class="dot"></span>${getReadingTime(a.title)} Lesezeit</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;
            initPullToRefresh();
        }

        let swipeStartX = 0;
        let cardEl = null;
        let swipeDirection = null;

        function startSwipe(e, card) {
            cardEl = card;
            swipeStartX = e.touches[0].clientX;
            card.style.transition = 'none';
            card.style.zIndex = '1000';
            swipeDirection = null;
        }

        function moveSwipe(e, card) {
            if (!cardEl || card !== cardEl) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - swipeStartX;
            
            card.classList.remove('swiping-left', 'swiping-right');
            if (diff < -20) {
                card.classList.add('swiping-left');
                swipeDirection = 'left';
            } else if (diff > 20) {
                card.classList.add('swiping-right');
                swipeDirection = 'right';
            }
            
            const rotate = diff * 0.03;
            card.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
        }

        function endSwipe(e, card) {
            if (!cardEl || card !== cardEl) return;
            
            const diff = swipeStartX - e.changedTouches[0].clientX;
            
            if (diff > 80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(-400px) rotate(-20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    if (!hiddenItems.includes(link)) {
                        hiddenItems.push(link);
                        localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                        updateCounts();
                    }
                    card.style.display = 'none';
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.zIndex = '';
                }, 300);
            } else if (diff < -80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(400px) rotate(20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    if (!readLaterItems.includes(link)) {
                        readLaterItems.push(link);
                        localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
                        updateCounts();
                    }
                    card.style.display = 'none';
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.zIndex = '';
                }, 300);
            } else {
                card.classList.remove('swiping-left', 'swiping-right');
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(0) rotate(0)';
            }
            
            cardEl = null;
        }

        function filterArticles(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.article-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? '' : 'none';
            });
        }

        function setFilter(filter) {
            articleFilter = filter;
            localStorage.setItem('articleFilter', filter);
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.filter === filter);
            });
            renderArticles();
        }

        function openArticle(link) {
            if (!hiddenItems.includes(link)) {
                hiddenItems.push(link);
                localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                updateCounts();
            }
            window.open(link, '_self');
            setTimeout(renderArticles, 500);
        }

        function updateCounts() {
            document.getElementById('hiddenCount').textContent = hiddenItems.length;
            document.getElementById('readLaterCount').textContent = readLaterItems.length;
            document.getElementById('keywordCount').textContent = keywords.length;
        }

        function renderReadLaterList() {
            const later = allArticles.filter(a => readLaterItems.includes(a.link));
            const container = document.getElementById('readLaterList');
            
            if (!later.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel gespeichert.</div>';
                return;
            }

            container.innerHTML = `
                <button class="action-btn" onclick="restoreAllReadLater()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${later.map(a => `
                        <div class="article-card" data-link="${a.link}" ontouchstart="startSwipe(event, this)" ontouchmove="moveSwipeRL(event, this)" ontouchend="endSwipeRL(event, this)">
                            <div class="swipe-bg-left"><span class="swipe-label">Entfernen</span></div>
                            <div onclick="openArticle('${a.link}')">
                                ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                                <div class="article-title">${a.title}</div>
                                <div class="article-meta"><span>${a.feedName}</span></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function moveSwipeRL(e, card) {
            if (!cardEl || card !== cardEl) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - swipeStartX;
            
            card.classList.remove('swiping-left', 'swiping-right');
            if (diff < -20) card.classList.add('swiping-left');
            
            const rotate = diff * 0.03;
            card.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
        }

        function endSwipeRL(e, card) {
            if (!cardEl || card !== cardEl) return;
            const diff = swipeStartX - e.changedTouches[0].clientX;
            
            if (diff > 80) {
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(-400px) rotate(-20deg)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    const link = card.dataset.link;
                    readLaterItems = readLaterItems.filter(l => l !== link);
                    localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
                    updateCounts();
                    renderReadLaterList();
                }, 300);
            } else {
                card.classList.remove('swiping-left');
                card.style.transition = 'all 0.3s ease-out';
                card.style.transform = 'translateX(0) rotate(0)';
            }
            cardEl = null;
        }

        function restoreAllReadLater() {
            readLaterItems = [];
            localStorage.setItem('readLaterItems', JSON.stringify(readLaterItems));
            updateCounts();
            renderReadLaterList();
            renderArticles();
        }

        function renderHiddenList() {
            const hidden = allArticles.filter(a => hiddenItems.includes(a.link));
            const container = document.getElementById('hiddenList');
            
            if (!hidden.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel versteckt.</div>';
                return;
            }

            container.innerHTML = `
                <button class="action-btn" onclick="restoreAllHidden()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${hidden.map(a => `
                        <div class="article-card" onclick="restoreHidden('${a.link}')">
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function restoreHidden(link) {
            hiddenItems = hiddenItems.filter(l => l !== link);
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateCounts();
            renderHiddenList();
            renderArticles();
        }

        function restoreAllHidden() {
            hiddenItems = [];
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateCounts();
            renderHiddenList();
            renderArticles();
        }

        function renderKeywordList() {
            const container = document.getElementById('keywordList');
            container.innerHTML = keywords.map(kw => `
                <div class="keyword-tag" onclick="setFilter('kw:${kw}')">
                    ${kw}
                    <span class="remove" onclick="event.stopPropagation(); removeKeyword('${kw}')">×</span>
                </div>
            `).join('');
        }

        function addKeyword() {
            const input = document.getElementById('keywordInput');
            const kw = input.value.trim();
            if (kw && !keywords.includes(kw)) {
                keywords.push(kw);
                localStorage.setItem('keywords', JSON.stringify(keywords));
                input.value = '';
                renderKeywordList();
                updateCounts();
                renderArticles();
            }
        }

        function removeKeyword(kw) {
            keywords = keywords.filter(k => k !== kw);
            localStorage.setItem('keywords', JSON.stringify(keywords));
            renderKeywordList();
            updateCounts();
            if (articleFilter === 'kw:' + kw) {
                setFilter('all');
            } else {
                renderArticles();
            }
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        function openOverlay(name) {
            document.getElementById('overlay-' + name).classList.add('active');
            document.getElementById('sidebar').classList.remove('active');
            
            if (name === 'hidden') renderHiddenList();
            if (name === 'readLater') renderReadLaterList();
            if (name === 'keywords') renderKeywordList();
        }

        function closeOverlay() {
            document.querySelectorAll('.overlay-page').forEach(o => o.classList.remove('active'));
        }

        let ptrStart = 0;
        function initPullToRefresh() {
            const main = document.getElementById('mainContent');
            main.addEventListener('touchstart', e => {
                if (main.scrollTop > 0) return;
                ptrStart = e.touches[0].clientY;
            }, { passive: true });
            
            main.addEventListener('touchmove', e => {
                if (main.scrollTop > 0) return;
                const diff = e.touches[0].clientY - ptrStart;
                const indicator = document.getElementById('pullIndicator');
                if (diff > 60) {
                    indicator.style.display = 'block';
                    indicator.textContent = '↓ Loslassen zum Aktualisieren';
                }
            }, { passive: true });
            
            main.addEventListener('touchend', e => {
                const indicator = document.getElementById('pullIndicator');
                if (indicator.style.display === 'block') {
                    indicator.textContent = 'Lade...';
                    loadFeeds();
                    setTimeout(() => indicator.style.display = 'none', 1000);
                }
            }, { passive: true });
        }

        init();
    </script>
</body>
</html>
