<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Menzis RSS v2.1</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1E0505;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #00B800;
            --orange: #ff8c00;
            --red: #ff0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--accent);
            z-index: 100;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 5px;
        }
        .hamburger span {
            width: 20px;
            height: 2px;
            background: var(--accent);
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--orange);
            flex: 1;
        }

        .search-input {
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            width: 100px;
            font-size: 0.8rem;
        }
        .search-input:focus { width: 150px; outline: none; }

        .tab-bar {
            display: flex;
            overflow-x: auto;
            gap: 0.25rem;
            padding: 0.5rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--accent);
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.35rem 0.7rem;
            border-radius: 12px;
            background: var(--bg);
            color: var(--text-dim);
            font-size: 0.7rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0.75rem;
        }

        .article-card {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 0.75rem;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            filter: brightness(1.5);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, opacity 0.2s;
        }
        .article-card.swiping {
            transform: translateX(-80px);
            opacity: 0.6;
        }
        .article-card .swipe-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card:hover .swipe-hint {
            opacity: 0.4;
        }

        .article-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .article-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.3rem;
        }

        .article-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .article-meta span { color: var(--accent); }

        .swipe-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.3;
        }

        .no-feeds {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.3rem;
        }
        .loading-dots span {
            font-size: 2rem;
            font-weight: bold;
            animation: bounce 1.5s ease-in-out infinite;
        }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        .loading-dots span:nth-child(4) { animation-delay: 0.45s; }
        .loading-dots span:nth-child(5) { animation-delay: 0.6s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-20px); }
            60% { transform: translateY(0); }
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: var(--card-bg);
            border-right: 2px solid var(--accent);
            z-index: 200;
            transition: left 0.3s;
            overflow-y: auto;
            padding-bottom: 2rem;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-sidebar {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar-title {
            padding: 1rem;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hidden-count {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }

        .overlay-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        .overlay-page.active { display: flex; }

        .overlay-header {
            padding: 1rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .close-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .overlay-title {
            font-weight: 600;
            flex: 1;
        }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .feed-category-title {
            padding: 0.5rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--card-bg);
            margin-top: 0.5rem;
        }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
        }

        .feed-toggle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feed-toggle.checked::after {
            content: '✓';
            color: var(--accent);
            font-size: 0.8rem;
        }

        .theme-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem;
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--accent);
        }
        .theme-btn.active {
            background: var(--accent);
            color: #000;
        }

        .card-style-selector {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
        }
        .card-style-btn {
            flex: 1;
            padding: 0.5rem;
            text-align: center;
            border: 1px solid var(--accent);
            border-radius: 8px;
            cursor: pointer;
        }
        .card-style-btn.active {
            background: var(--accent);
            color: #000;
        }

        .custom-url-input {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .add-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .restore-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .pull-indicator {
            text-align: center;
            padding: 0.5rem;
            color: var(--accent);
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
        <div class="header-title">Menzis RSS <small>v2.1</small></div>
        <div style="position:relative;display:flex;align-items:center;">
            <svg style="position:absolute;left:8px;width:14px;height:14px;fill:var(--text-dim)" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" class="search-input" style="padding-left:28px" placeholder="Suchen..." oninput="filterArticles(this.value)">
        </div>
    </div>

    <div class="tab-bar" id="tabBar"></div>

    <div id="mainContent">
        <div class="loading">
            <div class="loading-dots"><span>L</span><span>A</span><span>D</span><span>E</span><span>N</span></div>
        </div>
        <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Menü</span>
            <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div class="nav-item" onclick="openOverlay('feeds')">Feed-Auswahl</div>
        <div class="nav-item" onclick="openOverlay('design')">Aussehen</div>
        <div class="nav-item" onclick="openOverlay('url')">Eigene URL</div>
        <div class="nav-item" onclick="openOverlay('hidden')">
            Versteckte Artikel <span id="hiddenCount" class="hidden-count">0</span>
        </div>
    </div>

    <div class="overlay-page" id="overlay-feeds">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Feed-Auswahl</span>
        </div>
        <div class="overlay-content" id="feedLists"></div>
    </div>

    <div class="overlay-page" id="overlay-design">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Aussehen</span>
        </div>
        <div class="overlay-content">
            <div class="feed-category-title">Farbschema</div>
            <div class="theme-selector" id="themeSelector"></div>
        </div>
    </div>

    <div class="overlay-page" id="overlay-url">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Eigene URL hinzufügen</span>
        </div>
        <div class="overlay-content">
            <input type="text" class="custom-url-input" id="customUrl" placeholder="https://...">
            <button class="add-btn" onclick="addCustomFeed()">Hinzufügen</button>
        </div>
    </div>

    <div class="overlay-page" id="overlay-hidden">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Versteckte Artikel</span>
        </div>
        <div class="overlay-content" id="hiddenList"></div>
    </div>

    <script>
        const feedData = {
            national: [
                { name: 'Tagesschau', url: 'https://www.tagesschau.de/xml/rss2' },
                { name: 'SPIEGEL', url: 'https://www.spiegel.de/schlagzeilen/index.rss' },
                { name: 'FAZ', url: 'https://www.faz.net/rss/aktuell' }
            ],
            regional: [
                { name: 'NDR MV', url: 'https://www.ndr.de/nachrichten/mecklenburg-vorpommern/index~rss2.xml' },
                { name: 'NDR SH', url: 'https://www.ndr.de/nachrichten/schleswig-holstein/index~rss2.xml' },
                { name: 'NDR NI', url: 'https://www.ndr.de/nachrichten/niedersachsen/index~rss2.xml' },
                { name: 'NDR HH', url: 'https://www.ndr.de/nachrichten/hamburg/index~rss2.xml' }
            ],
            tech: [
                { name: 'ComputerBILD', url: 'https://www.computerbild.de/rssfeed_2261.xml' },
                { name: 'Futurezone', url: 'https://futurezone.de/rss' },
                { name: 'Turing', url: 'https://turingmagazin.de/feed' }
            ],
            tech2: [
                { name: 'Fefe', url: 'https://blog.fefe.de/rss.xml' },
                { name: 'Caschy', url: 'https://stadt-bremerhaven.de/feed/' },
                { name: 'Netzpolitik', url: 'https://netzpolitik.org/feed/' },
                { name: 't3n', url: 'https://t3n.de/rss.xml' },
                { name: 'Kuketz IT', url: 'https://www.kuketz-blog.de/feed/' },
                { name: 'ComputerBase', url: 'https://www.computerbase.de/rss/news.xml' },
                { name: 'Inside Digital', url: 'https://www.inside-digital.de/feed' }
            ],
            finance: [
                { name: 'Gründerszene', url: 'https://www.businessinsider.de/gruenderszene/feed/' },
                { name: 'Deutsche Startups', url: 'https://www.deutsche-startups.de/feed/' }
            ],
            society: [
                { name: 'Postillon', url: 'https://www.der-postillon.com/feeds/posts/default' },
                { name: 'Übermedien', url: 'https://uebermedien.de/feed/' },
                { name: 'NachDenkSeiten', url: 'https://www.nachdenkseiten.de/?feed=rss2' },
                { name: 'Cicero', url: 'https://www.cicero.de/rss.xml' },
                { name: 'Tichys Einblick', url: 'https://www.tichyseinblick.de/feed/' },
                { name: 'Telepolis', url: 'https://www.telepolis.de/news-atom.xml' },
                { name: 'Apollo News', url: 'https://apollo-news.de/feed/' },
                { name: 'Junge Freiheit', url: 'https://jungefreiheit.de/feed/' }
            ],
            science: [
                { name: 'Quarks', url: 'https://www.quarks.de/feed/' },
                { name: 'Klimareporter', url: 'https://www.klimareporter.de/?format=feed&type=rss' }
            ],
            culture: [
                { name: 'NDR Kultur', url: 'https://www.ndr.de/kultur/index~rss2.xml' }
            ],
            lifestyle: [
                { name: 'Mit Vergnügen', url: 'https://mitvergnuegen.com/feed/' },
                { name: 'Eurogamer', url: 'https://www.eurogamer.de/feed/news' },
                { name: 'Moviepilot', url: 'https://www.moviepilot.de/news.rss' }
            ],
            mobile: [
                { name: 'Android-User.de', url: 'https://www.android-user.de/feed/' },
                { name: 'XDA Android', url: 'https://www.xda-developers.com/feed/' },
                { name: 'SmartDroid', url: 'https://www.smartdroid.de/feed/' }
            ],
            apple: [
                { name: 'Macerkopf', url: 'https://www.macerkopf.de/feed/' },
                { name: 'iFun', url: 'https://www.ifun.de/feed/' },
                { name: 'Sir Apfelot', url: 'https://www.sir-apfelot.de/feed/' },
                { name: 'Apfelpage', url: 'https://www.apfelpage.de/feed/' },
                { name: 'Macwelt', url: 'https://www.macwelt.de/feed/' }
            ],
            cooking: [
                { name: 'Eat this! (Vegan)', url: 'https://www.eat-this.org/feed/' },
                { name: 'Valentinas Kochbuch', url: 'https://valentinas-kochbuch.de/feed/' },
                { name: 'HighFoodality', url: 'https://www.highfoodality.de/feed/' },
                { name: 'Backen macht glücklich', url: 'https://www.backenmachtgluecklich.de/feed/' },
                { name: 'Mann backt', url: 'https://www.mannbackt.de/feed/' }
            ]
        };

        const themes = {
            classic: { bg: '#000000', card: '#1E0505', accent: '#00B800' },
            blue: { bg: '#000510', card: '#051525', accent: '#00D4FF' },
            forest: { bg: '#051005', card: '#0A2008', accent: '#00FF66' },
            sunset: { bg: '#100505', card: '#200A15', accent: '#FF8C00' },
            night: { bg: '#000000', card: '#111111', accent: '#ffffff' }
        };

        const themeNames = {
            classic: 'Classic', blue: 'Midnight', forest: 'Forest', sunset: 'Sunset', night: 'Nacht'
        };

        let enabledFeeds = JSON.parse(localStorage.getItem('enabledFeeds'));
        if (!enabledFeeds || !enabledFeeds.length) {
            enabledFeeds = ['https://stadt-bremerhaven.de/feed/'];
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
        }
        
        let hiddenItems = JSON.parse(localStorage.getItem('hiddenItems')) || [];
        let cardStyle = localStorage.getItem('cardStyle') || 'modern';
        let currentTheme = localStorage.getItem('theme') || 'classic';
        let articleFilter = localStorage.getItem('articleFilter') || 'society';
        let allArticles = [];
        let customFeeds = JSON.parse(localStorage.getItem('customFeeds')) || [];

        const feedCategoryMap = {};
        Object.entries(feedData).forEach(([cat, feeds]) => {
            feeds.forEach(f => feedCategoryMap[f.url] = cat);
        });
        customFeeds.forEach(f => feedCategoryMap[f.url] = 'custom');

        function init() {
            setTheme(currentTheme);
            renderThemeSelector();
            renderFeedLists();
            updateHiddenCount();
            loadFeeds();
            setFilter(articleFilter);
        }

        function setTheme(theme) {
            currentTheme = theme;
            const colors = themes[theme];
            document.documentElement.style.setProperty('--bg', colors.bg);
            document.documentElement.style.setProperty('--card-bg', colors.card);
            document.documentElement.style.setProperty('--accent', colors.accent);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
        }

        function renderThemeSelector() {
            const container = document.getElementById('themeSelector');
            container.innerHTML = Object.entries(themes).map(([key, val]) => 
                `<div class="theme-btn" data-theme="${key}" onclick="setTheme('${key}')" style="background:${val.card};color:${val.accent}">${themeNames[key]}</div>`
            ).join('');
        }

        function renderFeedLists() {
            const container = document.getElementById('feedLists');
            let html = '';
            
            const allCategories = { ...feedData };
            if (customFeeds.length) allCategories.custom = customFeeds;

            Object.entries(allCategories).forEach(([category, feeds]) => {
                const title = category.charAt(0).toUpperCase() + category.slice(1);
                html += `<div class="feed-category-title">${title}</div>`;
                html += feeds.map(feed => `
                    <div class="feed-item" onclick="toggleFeed('${feed.url}')">
                        <div class="feed-toggle ${enabledFeeds.includes(feed.url) ? 'checked' : ''}" data-url="${feed.url}"></div>
                        <span>${feed.name}</span>
                    </div>
                `).join('');
            });
            
            container.innerHTML = html;
        }

        function toggleFeed(url) {
            if (enabledFeeds.includes(url)) {
                enabledFeeds = enabledFeeds.filter(f => f !== url);
            } else {
                enabledFeeds.push(url);
            }
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            renderFeedLists();
            loadFeeds();
        }

        function addCustomFeed() {
            const url = document.getElementById('customUrl').value.trim();
            if (!url) return;
            
            const name = url.split('/')[2] || 'Custom';
            customFeeds.push({ name, url });
            localStorage.setItem('customFeeds', JSON.stringify(customFeeds));
            
            if (!enabledFeeds.includes(url)) {
                enabledFeeds.push(url);
                localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            }
            
            document.getElementById('customUrl').value = '';
            renderFeedLists();
            loadFeeds();
            closeOverlay();
        }

        function loadFeeds() {
            if (!enabledFeeds.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Feeds ausgewählt.<br>Menü → Feed-Auswahl</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="loading"><div class="loading-dots"><span>L</span><span>A</span><span>D</span><span>E</span><span>N</span></div></div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;

            allArticles = [];
            let loaded = 0;

            enabledFeeds.forEach(url => fetchFeed(url));

            function fetchFeed(url) {
                fetch(`https://www.toptal.com/developers/feed2json/convert?url=${encodeURIComponent(url)}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.version && data.items && data.items.length > 0) {
                            const feedData = {
                                feed: { title: data.title || url.split('/')[2] },
                                items: data.items.slice(0, 30).map(item => ({
                                    title: item.title || '',
                                    link: item.url || item.id || '',
                                    pubDate: item.date_published || '',
                                    description: item.content_text || item.content_html || '',
                                    thumbnail: item.image || ''
                                }))
                            };
                            processFeedData(feedData, url);
                        } else {
                            loaded++;
                            if (loaded >= enabledFeeds.length) renderArticles();
                        }
                    })
                    .catch(() => {
                        loaded++;
                        if (loaded >= enabledFeeds.length) renderArticles();
                    });
            }

            function processFeedData(data, url) {
                const feedName = data.feed.title || url.split('/')[2];
                data.items.slice(0, 30).forEach(item => {
                    let thumb = item.thumbnail || '';
                    if (!thumb && item.enclosure) {
                        thumb = item.enclosure.thumbnail || item.enclosure.link || '';
                    }
                    if (!thumb && item.description) {
                        const m = item.description.match(/<img[^>]+src=["']([^"']+)["']/);
                        if (m) thumb = m[1];
                    }
                    if (!thumb && item.content) {
                        const m = item.content.match(/<img[^>]+src=["']([^"']+)["']/);
                        if (m) thumb = m[1];
                    }
                    allArticles.push({
                        title: item.title,
                        link: item.link,
                        pubDate: item.pubDate,
                        thumbnail: thumb,
                        feedName,
                        feedUrl: url
                    });
                });
                loaded++;
                if (loaded >= enabledFeeds.length) renderArticles();
            }
        }

        function renderTabs() {
            const categoryCounts = {};
            allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .forEach(a => {
                    const cat = feedCategoryMap[a.feedUrl] || 'other';
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });

            const catNames = {
                national: 'Nachrichten', tech: 'Tech', finance: 'Wirtschaft', tech2: 'Tech-News',
                mobile: 'Mobile', apple: 'Apple', society: 'Gesellschaft', cooking: 'Kochen',
                regional: 'Regional', science: 'Wissenschaft', culture: 'Kultur', lifestyle: 'Lifestyle'
            };

            const sortedCats = Object.entries(categoryCounts)
                .sort((a, b) => b[1] - a[1])
                .filter(([cat]) => cat !== 'other' && catNames[cat])
                .map(([cat]) => cat);

            let tabHtml = '<div class="tab' + (articleFilter === 'all' ? ' active' : '') + '" data-filter="all" onclick="setFilter(\'all\')">Alle</div>';
            sortedCats.forEach(cat => {
                tabHtml += '<div class="tab' + (articleFilter === cat ? ' active' : '') + '" data-filter="' + cat + '" onclick="setFilter(\'' + cat + '\')">' + catNames[cat] + '</div>';
            });

            document.getElementById('tabBar').innerHTML = tabHtml;
        }

        function renderArticles() {
            let articles = allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, 100);

            if (articleFilter !== 'all') {
                articles = articles.filter(a => feedCategoryMap[a.feedUrl] === articleFilter);
            }

            renderTabs();

            if (!articles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Artikel vorhanden.<br>Alle ausgeblendet oder keine Feeds aktiviert.</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="articles-list">
                    ${articles.map(a => `
                        <div class="article-card" data-link="${a.link}" onclick="openArticle('${a.link}')" ontouchstart="startSwipe(event, this)" ontouchend="endSwipe(event, this)">
                            <span class="swipe-hint">←</span>
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span> • ${new Date(a.pubDate).toLocaleString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;
            initPullToRefresh();
        }

        let swipeStartX = 0;
        let cardEl = null;

        function startSwipe(e, card) {
            cardEl = card;
            swipeStartX = e.touches[0].clientX;
        }

        function endSwipe(e, card) {
            const endX = e.changedTouches[0].clientX;
            const diff = swipeStartX - endX;
            if (diff > 80) {
                const link = card.dataset.link;
                if (!hiddenItems.includes(link)) {
                    hiddenItems.push(link);
                    localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                    updateHiddenCount();
                }
                card.style.display = 'none';
            }
            card.classList.remove('swiping');
        }

        function filterArticles(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.article-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? '' : 'none';
            });
        }

        function setFilter(filter) {
            articleFilter = filter;
            localStorage.setItem('articleFilter', filter);
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.filter === filter);
            });
            let articles = allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, 100);

            if (filter !== 'all') {
                articles = articles.filter(a => feedCategoryMap[a.feedUrl] === filter);
            }

            if (!articles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Artikel vorhanden.<br>Alle ausgeblendet oder keine Feeds aktiviert.</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="articles-list">
                    ${articles.map(a => `
                        <div class="article-card" data-link="${a.link}" onclick="openArticle('${a.link}')" ontouchstart="startSwipe(event, this)" ontouchend="endSwipe(event, this)">
                            <span class="swipe-hint">←</span>
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span> • ${new Date(a.pubDate).toLocaleString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;
            initPullToRefresh();
        }

        function openArticle(link) {
            if (!hiddenItems.includes(link)) {
                hiddenItems.push(link);
                localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                updateHiddenCount();
            }
            window.open(link, '_blank');
            setTimeout(renderArticles, 500);
        }

        function updateHiddenCount() {
            document.getElementById('hiddenCount').textContent = hiddenItems.length;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function openOverlay(name) {
            document.getElementById('overlay-' + name).classList.add('active');
            document.getElementById('sidebar').classList.remove('active');
            
            if (name === 'hidden') {
                renderHiddenList();
            }
        }

        function closeOverlay() {
            document.querySelectorAll('.overlay-page').forEach(o => o.classList.remove('active'));
        }

        function renderHiddenList() {
            const hidden = allArticles.filter(a => hiddenItems.includes(a.link));
            const container = document.getElementById('hiddenList');
            
            if (!hidden.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel versteckt.</div>';
                return;
            }

            container.innerHTML = `
                <button class="restore-btn" onclick="restoreAllHidden()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${hidden.map(a => `
                        <div class="article-card" onclick="restoreHidden('${a.link}')">
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function restoreHidden(link) {
            hiddenItems = hiddenItems.filter(l => l !== link);
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateHiddenCount();
            renderHiddenList();
            renderArticles();
        }

        function restoreAllHidden() {
            hiddenItems = [];
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateHiddenCount();
            renderHiddenList();
            renderArticles();
        }

        function setCardStyle(style) {
            cardStyle = style;
            localStorage.setItem('cardStyle', style);
            document.querySelectorAll('.card-style-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.style === style);
            });
        }

        let ptrStart = 0;
        function initPullToRefresh() {
            const main = document.getElementById('mainContent');
            main.addEventListener('touchstart', e => {
                if (main.scrollTop > 0) return;
                ptrStart = e.touches[0].clientY;
            }, { passive: true });
            
            main.addEventListener('touchmove', e => {
                if (main.scrollTop > 0) return;
                const diff = e.touches[0].clientY - ptrStart;
                const indicator = document.getElementById('pullIndicator');
                if (diff > 60) {
                    indicator.style.display = 'block';
                    indicator.textContent = '↓ Loslassen zum Aktualisieren';
                }
            }, { passive: true });
            
            main.addEventListener('touchend', e => {
                const indicator = document.getElementById('pullIndicator');
                if (indicator.style.display === 'block') {
                    indicator.textContent = 'Lade...';
                    loadFeeds();
                    setTimeout(() => indicator.style.display = 'none', 1000);
                }
            }, { passive: true });
        }

        init();
    </script>
</body>
</html>
