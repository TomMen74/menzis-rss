<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Menzis RSS v2.2.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #00B800;
            --md-sys-color-on-primary: #003300;
            --md-sys-color-primary-container: #004400;
            --md-sys-color-secondary: #ff8c00;
            --md-sys-color-surface: #1a1a1a;
            --md-sys-color-surface-container: #262626;
            --md-sys-color-surface-container-high: #333333;
            --md-sys-color-on-surface: #e6e6e6;
            --md-sys-color-on-surface-variant: #b3b3b3;
            --md-sys-color-outline: #666666;
            --md-sys-color-error: #ff4444;
            --md-sys-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            --md-sys-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
            --md-sys-elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
            --md-sys-radius-small: 8px;
            --md-sys-radius-medium: 12px;
            --md-sys-radius-large: 16px;
            --md-sys-radius-extra-large: 28px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--md-sys-color-surface-container);
            box-shadow: var(--md-sys-elevation-2);
            z-index: 100;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .hamburger:hover { background: var(--md-sys-color-surface-container-high); }
        .hamburger span {
            width: 18px;
            height: 2px;
            background: var(--md-sys-color-on-surface);
            margin: 0 auto;
            border-radius: 1px;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--md-sys-color-secondary);
            flex: 1;
            letter-spacing: 0.1px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            background: var(--md-sys-color-surface-container);
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-on-surface);
            padding: 0.5rem 0.75rem 0.5rem 2.25rem;
            border-radius: var(--md-sys-radius-extra-large);
            width: 120px;
            font-size: 0.9rem;
            transition: width 0.3s, background 0.2s, border-color 0.2s;
        }
        .search-input:focus { 
            width: 180px; 
            outline: none; 
            background: var(--md-sys-color-surface-container-high);
            border-color: var(--md-sys-color-primary);
        }
        .search-input::placeholder { color: var(--md-sys-color-on-surface-variant); }
        
        .search-icon {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            color: var(--md-sys-color-on-surface-variant);
        }

        .tab-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--md-sys-color-surface-container);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.5rem 1rem;
            border-radius: var(--md-sys-radius-extra-large);
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.8125rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .tab:hover { background: var(--md-sys-color-surface-container-high); }
        .tab.active {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: var(--md-sys-elevation-1);
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .article-card {
            background: var(--md-sys-color-surface-container);
            border-radius: var(--md-sys-radius-medium);
            padding: 1rem;
            box-shadow: var(--md-sys-elevation-1);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-card:hover {
            box-shadow: var(--md-sys-elevation-2);
        }
        .article-card:active {
            transform: scale(0.98);
        }
        .article-card.swiping {
            transform: translateX(-60px);
            opacity: 0.7;
        }
        .article-card .swipe-hint {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--md-sys-color-primary);
            font-size: 1.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card:hover .swipe-hint { opacity: 0.5; }

        .article-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--md-sys-radius-small);
            margin-bottom: 0.75rem;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: var(--md-sys-color-on-surface);
        }

        .article-meta {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .article-meta .feed-name {
            color: var(--md-sys-color-primary);
            font-weight: 500;
        }
        .article-meta .dot {
            width: 3px;
            height: 3px;
            background: var(--md-sys-color-on-surface-variant);
            border-radius: 50%;
        }

        .no-feeds {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--md-sys-color-on-surface-variant);
        }
        .no-feeds h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--md-sys-color-on-surface);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            gap: 1rem;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--md-sys-color-surface-container-high);
            border-top-color: var(--md-sys-color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.875rem;
        }

        .pull-indicator {
            text-align: center;
            padding: 0.75rem;
            color: var(--md-sys-color-primary);
            font-size: 0.875rem;
            display: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            max-width: 85vw;
            height: 100vh;
            background: var(--md-sys-color-surface-container);
            box-shadow: var(--md-sys-elevation-3);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--md-sys-color-outline);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }
        .close-sidebar {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .close-sidebar:hover { background: var(--md-sys-color-surface-container-high); }

        .nav-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--md-sys-color-surface-container-high); }
        .nav-item-label {
            font-size: 1rem;
            font-weight: 400;
            color: var(--md-sys-color-on-surface);
        }
        .nav-item-icon {
            color: var(--md-sys-color-on-surface-variant);
        }
        .hidden-count {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .overlay-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--md-sys-color-surface);
            z-index: 300;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .overlay-page.active { display: flex; }

        .overlay-header {
            padding: 1rem 0.5rem;
            background: var(--md-sys-color-surface-container);
            border-bottom: 1px solid var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface);
            padding: 0.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: background 0.2s;
        }
        .close-btn:hover { background: var(--md-sys-color-surface-container-high); }

        .overlay-title {
            font-size: 1.25rem;
            font-weight: 500;
            flex: 1;
            color: var(--md-sys-color-on-surface);
        }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .feed-category-title {
            padding: 1rem 0.75rem 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--md-sys-color-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            cursor: pointer;
            border-radius: var(--md-sys-radius-small);
            transition: background 0.2s;
        }
        .feed-item:hover { background: var(--md-sys-color-surface-container-high); }

        .feed-toggle {
            width: 24px;
            height: 24px;
            border: 2px solid var(--md-sys-color-outline);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .feed-toggle.checked {
            background: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }
        .feed-toggle.checked::after {
            content: '✓';
            color: var(--md-sys-color-on-primary);
            font-size: 0.875rem;
            font-weight: bold;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            padding: 1rem;
        }

        .theme-btn {
            padding: 1rem;
            border-radius: var(--md-sys-radius-medium);
            cursor: pointer;
            border: 1px solid var(--md-sys-color-outline);
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }
        .theme-btn:hover { box-shadow: var(--md-sys-elevation-2); }
        .theme-btn.active {
            border-color: var(--md-sys-color-primary);
            box-shadow: var(--md-sys-elevation-2);
        }

        .custom-url-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--md-sys-color-surface-container);
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-on-surface);
            border-radius: var(--md-sys-radius-small);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .custom-url-input:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
        }

        .add-btn {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: var(--md-sys-radius-small);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: box-shadow 0.2s;
        }
        .add-btn:hover { box-shadow: var(--md-sys-elevation-2); }

        .restore-btn {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: var(--md-sys-radius-small);
            cursor: pointer;
            font-weight: 500;
            margin: 1rem;
        }

        .overlay-content input::placeholder {
            color: var(--md-sys-color-on-surface-variant);
        }

        .fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            box-shadow: var(--md-sys-elevation-3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 50;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: var(--md-sys-elevation-3); }
        .fab:active { transform: scale(0.95); }

        .overlay-content .restore-btn {
            display: block;
            width: calc(100% - 2rem);
            margin: 1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
        <div class="header-title">Menzis RSS <small>v2.2.7</small></div>
        <div style="position:relative;display:flex;align-items:center;">
            <svg style="position:absolute;left:8px;width:14px;height:14px;fill:var(--text-dim)" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" class="search-input" style="padding-left:28px" placeholder="Suchen..." oninput="filterArticles(this.value)">
        </div>
    </div>

    <div class="tab-bar" id="tabBar"></div>

    <div id="mainContent">
        <div class="loading">
            <div class="loading-dots"><span>L</span><span>A</span><span>D</span><span>E</span><span>N</span></div>
        </div>
        <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Menü</span>
            <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div class="nav-item" onclick="openOverlay('feeds')">Feed-Auswahl</div>
        <div class="nav-item" onclick="openOverlay('url')">Eigene URL</div>
        <div class="nav-item" onclick="openOverlay('hidden')">
            Versteckte Artikel <span id="hiddenCount" class="hidden-count">0</span>
        </div>
    </div>

    <div class="overlay-page" id="overlay-feeds">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Feed-Auswahl</span>
        </div>
        <div class="overlay-content" id="feedLists"></div>
    </div>

    <div class="overlay-page" id="overlay-design">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Aussehen</span>
        </div>
        <div class="overlay-content">
            <div class="feed-category-title">Farbschema</div>
            <div class="theme-selector" id="themeSelector"></div>
        </div>
    </div>

    <div class="overlay-page" id="overlay-url">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Eigene URL hinzufügen</span>
        </div>
        <div class="overlay-content">
            <input type="text" class="custom-url-input" id="customUrl" placeholder="https://...">
            <button class="add-btn" onclick="addCustomFeed()">Hinzufügen</button>
        </div>
    </div>

    <div class="overlay-page" id="overlay-hidden">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <span class="overlay-title">Versteckte Artikel</span>
        </div>
        <div class="overlay-content" id="hiddenList"></div>
    </div>

    <script>
        const feedData = {
            national: [
                { name: 'Tagesschau', url: 'https://www.tagesschau.de/xml/rss2' },
                { name: 'SPIEGEL', url: 'https://www.spiegel.de/schlagzeilen/index.rss' },
                { name: 'FAZ', url: 'https://www.faz.net/rss/aktuell' }
            ],
            regional: [

                { name: 'NDR SH', url: 'https://www.ndr.de/nachrichten/schleswig-holstein/index~rss2.xml' },
                { name: 'NDR NI', url: 'https://www.ndr.de/nachrichten/niedersachsen/index~rss2.xml' },
                { name: 'NDR HH', url: 'https://www.ndr.de/nachrichten/hamburg/index~rss2.xml' }
            ],
            tech: [
                { name: 'ComputerBILD', url: 'https://www.computerbild.de/rssfeed_2261.xml' },
                { name: 'Futurezone', url: 'https://futurezone.de/rss' },
                { name: 'Turing', url: 'https://turingmagazin.de/feed' }
            ],
            tech2: [
                { name: 'Caschy', url: 'https://stadt-bremerhaven.de/feed/' },
                { name: 'Netzpolitik', url: 'https://netzpolitik.org/feed/' },
                { name: 't3n', url: 'https://t3n.de/rss.xml' },
                { name: 'Kuketz IT', url: 'https://www.kuketz-blog.de/feed/' },
                { name: 'ComputerBase', url: 'https://www.computerbase.de/rss/news.xml' },
                { name: 'Inside Digital', url: 'https://www.inside-digital.de/feed' }
            ],
            finance: [
                { name: 'Gründerszene', url: 'https://www.businessinsider.de/gruenderszene/feed/' },
                { name: 'Deutsche Startups', url: 'https://www.deutsche-startups.de/feed/' }
            ],
            society: [
                { name: 'NachDenkSeiten', url: 'https://www.nachdenkseiten.de/?feed=rss2' },
                { name: 'Cicero', url: 'https://www.cicero.de/rss.xml' },
                { name: 'Tichys Einblick', url: 'https://www.tichyseinblick.de/feed/' },
                { name: 'Telepolis', url: 'https://www.telepolis.de/news-atom.xml' },
                { name: 'Apollo News', url: 'https://apollo-news.de/feed/' },
                { name: 'Junge Freiheit', url: 'https://jungefreiheit.de/feed/' }
            ],
            science: [
                { name: 'Quarks', url: 'https://www.quarks.de/feed/' },
                { name: 'Klimareporter', url: 'https://www.klimareporter.de/?format=feed&type=rss' }
            ],
            culture: [
                { name: 'NDR Kultur', url: 'https://www.ndr.de/kultur/index~rss2.xml' }
            ],
            lifestyle: [
                { name: 'Mit Vergnügen', url: 'https://mitvergnuegen.com/feed/' },
                { name: 'Eurogamer', url: 'https://www.eurogamer.de/feed/news' },
                { name: 'Moviepilot', url: 'https://www.moviepilot.de/news.rss' }
            ],
            mobile: [
                { name: 'Android-User.de', url: 'https://www.android-user.de/feed/' },
                { name: 'XDA Android', url: 'https://www.xda-developers.com/feed/' },
                { name: 'SmartDroid', url: 'https://www.smartdroid.de/feed/' }
            ],
            apple: [
                { name: 'Macerkopf', url: 'https://www.macerkopf.de/feed/' },
                { name: 'iFun', url: 'https://www.ifun.de/feed/' },
                { name: 'Sir Apfelot', url: 'https://www.sir-apfelot.de/feed/' },
                { name: 'Apfelpage', url: 'https://www.apfelpage.de/feed/' },
                { name: 'Macwelt', url: 'https://www.macwelt.de/feed/' }
            ],
            cooking: [
                { name: 'Eat this! (Vegan)', url: 'https://www.eat-this.org/feed/' },
                { name: 'Valentinas Kochbuch', url: 'https://valentinas-kochbuch.de/feed/' },
                { name: 'HighFoodality', url: 'https://www.highfoodality.de/feed/' },
                { name: 'Backen macht glücklich', url: 'https://www.backenmachtgluecklich.de/feed/' },
                { name: 'Mann backt', url: 'https://www.mannbackt.de/feed/' }
            ]
        };

        const themes = {
            classic: { bg: '#000000', card: '#1E0505', accent: '#00B800' },
            blue: { bg: '#000510', card: '#051525', accent: '#00D4FF' },
            forest: { bg: '#051005', card: '#0A2008', accent: '#00FF66' },
            sunset: { bg: '#100505', card: '#200A15', accent: '#FF8C00' },
            night: { bg: '#000000', card: '#111111', accent: '#ffffff' }
        };

        const themeNames = {
            classic: 'Classic', blue: 'Midnight', forest: 'Forest', sunset: 'Sunset', night: 'Nacht'
        };

        let enabledFeeds = JSON.parse(localStorage.getItem('enabledFeeds'));
        if (!enabledFeeds || !enabledFeeds.length) {
            enabledFeeds = ['https://www.tagesschau.de/xml/rss2', 'https://stadt-bremerhaven.de/feed/', 'https://www.tichyseinblick.de/feed/'];
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            localStorage.setItem('articleFilter', 'all');
            localStorage.setItem('hiddenItems', '[]');
        }
        
        let hiddenItems = JSON.parse(localStorage.getItem('hiddenItems')) || [];
        let cardStyle = localStorage.getItem('cardStyle') || 'modern';
        let currentTheme = localStorage.getItem('theme') || 'classic';
        let articleFilter = localStorage.getItem('articleFilter') || '';
        let allArticles = [];
        let customFeeds = JSON.parse(localStorage.getItem('customFeeds')) || [];

        const feedCategoryMap = {};
        Object.entries(feedData).forEach(([cat, feeds]) => {
            feeds.forEach(f => feedCategoryMap[f.url] = cat);
        });
        customFeeds.forEach(f => feedCategoryMap[f.url] = 'custom');

        function init() {
            setTheme(currentTheme);
            renderThemeSelector();
            renderFeedLists();
            updateHiddenCount();
            loadFeeds();
        }

        function setTheme(theme) {
            currentTheme = theme;
            const colors = themes[theme];
            document.documentElement.style.setProperty('--bg', colors.bg);
            document.documentElement.style.setProperty('--card-bg', colors.card);
            document.documentElement.style.setProperty('--accent', colors.accent);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
        }

        function renderThemeSelector() {
            const container = document.getElementById('themeSelector');
            container.innerHTML = Object.entries(themes).map(([key, val]) => 
                `<div class="theme-btn" data-theme="${key}" onclick="setTheme('${key}')" style="background:${val.card};color:${val.accent}">${themeNames[key]}</div>`
            ).join('');
        }

        function renderFeedLists() {
            const container = document.getElementById('feedLists');
            let html = '';
            
            const allCategories = { ...feedData };
            if (customFeeds.length) allCategories.custom = customFeeds;

            Object.entries(allCategories).forEach(([category, feeds]) => {
                const title = category.charAt(0).toUpperCase() + category.slice(1);
                html += `<div class="feed-category-title">${title}</div>`;
                html += feeds.map(feed => `
                    <div class="feed-item" onclick="toggleFeed('${feed.url}')">
                        <div class="feed-toggle ${enabledFeeds.includes(feed.url) ? 'checked' : ''}" data-url="${feed.url}"></div>
                        <span>${feed.name}</span>
                    </div>
                `).join('');
            });
            
            container.innerHTML = html;
        }

        function toggleFeed(url) {
            if (enabledFeeds.includes(url)) {
                enabledFeeds = enabledFeeds.filter(f => f !== url);
            } else {
                enabledFeeds.push(url);
            }
            localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            renderFeedLists();
            loadFeeds();
        }

        function addCustomFeed() {
            const url = document.getElementById('customUrl').value.trim();
            if (!url) return;
            
            const name = url.split('/')[2] || 'Custom';
            customFeeds.push({ name, url });
            localStorage.setItem('customFeeds', JSON.stringify(customFeeds));
            
            if (!enabledFeeds.includes(url)) {
                enabledFeeds.push(url);
                localStorage.setItem('enabledFeeds', JSON.stringify(enabledFeeds));
            }
            
            document.getElementById('customUrl').value = '';
            renderFeedLists();
            loadFeeds();
            closeOverlay();
        }

        function loadFeeds() {
            if (!enabledFeeds.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Feeds ausgewählt.<br>Menü → Feed-Auswahl</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="loading"><div class="loading-dots"><span>L</span><span>A</span><span>D</span><span>E</span><span>N</span></div></div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;

            allArticles = [];
            let loaded = 0;

            document.querySelectorAll('.tab')?.forEach(t => t.classList.toggle('active', t.dataset.filter === articleFilter));

            enabledFeeds.forEach(url => fetchFeed(url));

            function fetchFeed(url) {
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => {
                        console.log('loaded:', url, 'status:', data.status);
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            processFeedData({ feed: { title: data.feed?.title || url.split('/')[2] }, items: data.items }, url);
                        }
                        loaded++;
                        if (loaded >= enabledFeeds.length) renderArticles();
                    })
                    .catch((e) => {
                        console.log('error:', url);
                        loaded++;
                        if (loaded >= enabledFeeds.length) renderArticles();
                    });
            }

            setTimeout(() => {
                if (loaded < enabledFeeds.length) {
                    console.log('timeout - forcing render');
                    loaded = enabledFeeds.length;
                    renderArticles();
                }
            }, 15000);

            function processFeedData(data, url) {
                const feedName = data.feed.title || url.split('/')[2];
                data.items.slice(0, 30).forEach(item => {
                    let thumb = item.thumbnail || '';
                    if (!thumb && item.enclosure && item.enclosure.type && item.enclosure.type.startsWith('image/')) {
                        thumb = item.enclosure.link || item.enclosure.thumbnail || '';
                    }
                    if (!thumb && item.description) {
                        const m = item.description.match(/<img[^>]+src=["']([^"']+)["']/);
                        if (m) thumb = m[1];
                    }
                    if (!thumb && item.content) {
                        const m = item.content.match(/<img[^>]+src=["']([^"']+)["']/);
                        if (m) thumb = m[1];
                    }
                    if (thumb && thumb.includes('follow.it')) {
                        thumb = '';
                    }
                    allArticles.push({
                        title: item.title,
                        link: item.link,
                        pubDate: item.pubDate,
                        thumbnail: thumb,
                        feedName,
                        feedUrl: url
                    });
                });
                loaded++;
                if (loaded >= enabledFeeds.length) renderArticles();
            }
        }

        function renderTabs() {
            const categoryCounts = {};
            allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .forEach(a => {
                    const cat = feedCategoryMap[a.feedUrl] || 'other';
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });

            const catNames = {
                national: 'Nachrichten', regional: 'Regional', tech: 'Tech', tech2: 'Tech-News',
                finance: 'Wirtschaft', society: 'Gesellschaft', science: 'Wissenschaft', culture: 'Kultur',
                lifestyle: 'Lifestyle', mobile: 'Mobile', apple: 'Apple', cooking: 'Kochen'
            };

            const catOrder = ['national', 'regional', 'tech', 'tech2', 'finance', 'society', 'science', 'culture', 'lifestyle', 'mobile', 'apple', 'cooking'];

            let tabHtml = '<div class="tab' + (articleFilter === 'all' ? ' active' : '') + '" data-filter="all" onclick="setFilter(\'all\')">Alle</div>';
            catOrder.forEach(cat => {
                if (categoryCounts[cat] && catNames[cat]) {
                    tabHtml += '<div class="tab' + (articleFilter === cat ? ' active' : '') + '" data-filter="' + cat + '" onclick="setFilter(\'' + cat + '\')">' + catNames[cat] + '</div>';
                }
            });

            document.getElementById('tabBar').innerHTML = tabHtml;
        }

        function renderArticles() {
            let articles = allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, 100);

            if (articleFilter !== 'all') {
                articles = articles.filter(a => feedCategoryMap[a.feedUrl] === articleFilter);
            }

            renderTabs();

            if (!allArticles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="loading-dots"><span>L</span><span>A</span><span>D</span><span>E</span><span>N</span></div></div>';
                return;
            }

            if (!articles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Artikel vorhanden.<br>Alle ausgeblendet oder keine Feeds aktiviert.</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="articles-list">
                    ${articles.map(a => `
                        <div class="article-card" data-link="${a.link}" onclick="openArticle('${a.link}')" ontouchstart="startSwipe(event, this)" ontouchend="endSwipe(event, this)">
                            <span class="swipe-hint">←</span>
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span class="feed-name">${a.feedName}</span><span class="dot"></span>${new Date(a.pubDate).toLocaleString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;
            initPullToRefresh();
        }

        let swipeStartX = 0;
        let cardEl = null;

        function startSwipe(e, card) {
            cardEl = card;
            swipeStartX = e.touches[0].clientX;
        }

        function endSwipe(e, card) {
            const endX = e.changedTouches[0].clientX;
            const diff = swipeStartX - endX;
            if (diff > 80) {
                const link = card.dataset.link;
                if (!hiddenItems.includes(link)) {
                    hiddenItems.push(link);
                    localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                    updateHiddenCount();
                }
                card.style.display = 'none';
            }
            card.classList.remove('swiping');
        }

        function filterArticles(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.article-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? '' : 'none';
            });
        }

        function setFilter(filter) {
            articleFilter = filter;
            localStorage.setItem('articleFilter', filter);
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.filter === filter);
            });
            let articles = allArticles
                .filter(a => !hiddenItems.includes(a.link))
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, 100);

            if (filter !== 'all') {
                articles = articles.filter(a => feedCategoryMap[a.feedUrl] === filter);
            }

            if (!articles.length) {
                document.getElementById('mainContent').innerHTML = '<div class="no-feeds">Keine Artikel vorhanden.<br>Alle ausgeblendet oder keine Feeds aktiviert.</div>';
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="articles-list">
                    ${articles.map(a => `
                        <div class="article-card" data-link="${a.link}" onclick="openArticle('${a.link}')" ontouchstart="startSwipe(event, this)" ontouchend="endSwipe(event, this)">
                            <span class="swipe-hint">←</span>
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span class="feed-name">${a.feedName}</span><span class="dot"></span>${new Date(a.pubDate).toLocaleString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="pull-indicator" id="pullIndicator">↓ Runterziehen zum Aktualisieren</div>
            `;
            initPullToRefresh();
        }

        function openArticle(link) {
            if (!hiddenItems.includes(link)) {
                hiddenItems.push(link);
                localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
                updateHiddenCount();
            }
            window.open(link, '_blank');
            setTimeout(renderArticles, 500);
        }

        function updateHiddenCount() {
            document.getElementById('hiddenCount').textContent = hiddenItems.length;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function openOverlay(name) {
            document.getElementById('overlay-' + name).classList.add('active');
            document.getElementById('sidebar').classList.remove('active');
            
            if (name === 'hidden') {
                renderHiddenList();
            }
        }

        function closeOverlay() {
            document.querySelectorAll('.overlay-page').forEach(o => o.classList.remove('active'));
        }

        function renderHiddenList() {
            const hidden = allArticles.filter(a => hiddenItems.includes(a.link));
            const container = document.getElementById('hiddenList');
            
            if (!hidden.length) {
                container.innerHTML = '<div class="no-feeds">Keine Artikel versteckt.</div>';
                return;
            }

            container.innerHTML = `
                <button class="restore-btn" onclick="restoreAllHidden()">Alle wiederherstellen</button>
                <div class="articles-list">
                    ${hidden.map(a => `
                        <div class="article-card" onclick="restoreHidden('${a.link}')">
                            ${a.thumbnail ? `<img src="${a.thumbnail}" alt="">` : ''}
                            <div class="article-title">${a.title}</div>
                            <div class="article-meta"><span>${a.feedName}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function restoreHidden(link) {
            hiddenItems = hiddenItems.filter(l => l !== link);
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateHiddenCount();
            renderHiddenList();
            renderArticles();
        }

        function restoreAllHidden() {
            hiddenItems = [];
            localStorage.setItem('hiddenItems', JSON.stringify(hiddenItems));
            updateHiddenCount();
            renderHiddenList();
            renderArticles();
        }

        function setCardStyle(style) {
            cardStyle = style;
            localStorage.setItem('cardStyle', style);
            document.querySelectorAll('.card-style-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.style === style);
            });
        }

        let ptrStart = 0;
        function initPullToRefresh() {
            const main = document.getElementById('mainContent');
            main.addEventListener('touchstart', e => {
                if (main.scrollTop > 0) return;
                ptrStart = e.touches[0].clientY;
            }, { passive: true });
            
            main.addEventListener('touchmove', e => {
                if (main.scrollTop > 0) return;
                const diff = e.touches[0].clientY - ptrStart;
                const indicator = document.getElementById('pullIndicator');
                if (diff > 60) {
                    indicator.style.display = 'block';
                    indicator.textContent = '↓ Loslassen zum Aktualisieren';
                }
            }, { passive: true });
            
            main.addEventListener('touchend', e => {
                const indicator = document.getElementById('pullIndicator');
                if (indicator.style.display === 'block') {
                    indicator.textContent = 'Lade...';
                    loadFeeds();
                    setTimeout(() => indicator.style.display = 'none', 1000);
                }
            }, { passive: true });
        }

        init();
    </script>
</body>
</html>
